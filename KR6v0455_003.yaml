body:
  text: 中華大藏經第二輯嘉興正續藏編目說明一中華大藏經第二輯影印嘉興正藏續藏又續藏及未入藏而除去已見於前輯者二嘉興藏係明萬曆十七年紫栢老人創刻易梵筴為書冊在五台開雕以後散在各地分刻成於萬曆末年繼刻續藏又續藏版藏雙徑寂照庵故名徑山藏由嘉興楞嚴寺總司流通故又名嘉興藏北京刻經處於民國九年所刻嘉興藏目錄記載順治十六年訂定正藏流通價格康熙十六年訂定正續藏流通價格逐目標價又續第十二函以後未標價格日本昭和法寶總目錄所載稱為藏版經直畫一目錄即北京刻本之重印而刪去標價正藏與別本目錄對校稱為原本與甲本內容大致相同續藏與甲乙丙丁四本目錄對校內容偶有不同簡稱原目或甲乙丙丁各目我國中央圖書舘藏有全藏失去目錄一正兩續頗有散佚曾就現存部份編目刊入善本書目正藏為一部門續藏附又續藏未入藏為一部門不分函次所謂未入藏者相傳為準備入藏而未正式編入之本簡稱善目或善本日本駒澤大學亦藏有全藏其正藏係黃檗藏天和元年即清康熙二十一年日僧鐵眼道光所刻內容與北藏畧同續藏目錄乃天保十四年即清道光二十三年日僧圓順鈔本較之上述各目稍有增加惟無未入藏部份而函次或有出入亦稍散佚簡稱駒目或駒本今彙合各目錄編訂新目其原目及甲乙丙丁四目經名頗有減字酌依善目駒目或從首題而刊行則以善本為主次為駒本或單行本無者由後輯出之或缺本除善本外皆隨目注明三嘉興木版精刻正藏校對有汲古閣毛晉題名雖未必親與其事亦可想見慎重正續藏冠以佛像頗多精美今於每冊首尾各印同一之像其餘各書原著之像亦予照印但極力避免重複四嘉興正藏目錄根據北藏每函排列先後偶有參差草函薩曇芬陀利經與普門品合為一目附錄南藏五部中以密雲禪師語錄代大明三藏聖教目錄因此視北藏祗減一目北藏併附錄五部為一千六百五十六部嘉興正藏為一千六百五十五部附錄五部之抽換密雲語錄非南藏所有而仍標為南藏似有未當昭和總目編號之字函大威德經二目因北京刻本前目適為整行遂誤為一目而少編一號作一千六百五十四號日本黃檗藏之編製證以經目之排列普門品之分出南藏五部之未抽換足徵其仿自北藏而非仿自嘉興然於嘉興為近駒本失去嘉興而代以黃檗與嘉興兩續合併甚為近理嘉興為中國現存方冊本藏經之始黃檗為日本刻成方冊本藏經之始而嘉興之刻在前刻印精美惟所編目錄沿襲南北藏目錄及北藏十卷一函之例經目分合不盡合理既不便於檢察又不便標寫譯著人名更不便與其他藏目對照茲畧為分出共增十三目另有易分為合者二目即嶽宗泰函武周目錄二目合併及紫至城函名稱歌曲與感應歌曲合併實增十一目更增藏外二目見本說明八共增十三目皆隨目注明原一千六百五十五目增十三目共一千六百六十八目此為釐訂正藏部數又正藏目錄原本函號附注函次其某函分屬某經者更注於經名之上合屬一經或數經易於查知者不注原刊頗不一律茲亦稍加釐訂五續藏又續藏目錄七部為原目甲乙丙丁四目及善目駒目原目四百三十八部昭和總目編號與正藏銜接由一千六百五十五號至二千零九十號就中又續十二函學佛考訓漏編一號又續二十函祖揆符禪師語錄與巖華集誤為一目漏編一號作四百三十六號今以原目為主校以甲乙丙丁四目及善目駒目稍有增加六原目有一目之內包含兩部乃至數部經典者如續十八函華嚴吞海集包括披雲集續三三函心經要論包括心經直談心經說奉法要茲皆分出并記明印行與否其由他目增入之經亦考慮應否分出隨目注明是為分出所增七甲乙丙丁四目及善目駒目較原目短少之經置諸不論較原目異出或增出之經除重複外如續二一函法華經玄義節要丙目代以法華經擊節已見續五三函憨山大師全集續三七函丁目有沙彌儀軌頌已見又續十八函皆因重複不取其餘並隨函彙入原目如續二九至三十函楞嚴經疏解蒙鈔丙目代以楞嚴經通義纂要續六一函乙目有四家評論今并增入亦皆隨目注明其存者并予照印續藏駒目與原目函次不同分注駒目套數於每函標次之下駒目最後所增三函則依原目順序仍分注駒目套數又續藏函次相同駒目最後所增三函續列於後冠以駒目二字是為別目所增八善目有所謂未入藏部份祗續藏部門下注又續藏未入藏附並未加以分析依次排列點查善本經書確有各本目錄所未載者而善本究屬何目亦成問題乍閱之下疑其屬於原目一經研究則兼有各目之經如紫栢尊者別集乃甲丙丁駒四目所有而善本有之見續五五函指月錄乃甲丙二目所有而善本有之見續八九函懶齋別集乃甲目所有而善本有之見又續第四函居士分燈錄乃駒目所有而善本有之見續四七函類此之書尚多皆已隨目注明細核可知是善本不惟不屬原目且不屬其餘各目尤其駒目增函增經顯係後期編成而於善目所謂未入藏者竟未全部編入甚難索解蓋諸本存佚增減互有不同不以各目為限而善目未入藏部份又不僅雜在兩續且於正藏說感武函大慧禪師語錄之後出宗門武庫及大慧禪師年譜核之各目亦屬未入藏者更考蕅益大師據南北藏而作閱藏知津宗門武庫在應入藏諸書之列尤可證明其未入北藏駒目就黃檗目錄粘籤增此二目與善目同編訂善目絕不可能獲睹駒目而以類相從之旨不謀而合今於正藏增武庫年譜二目并師其意以善目所載不見於各目者為未入藏部份同本合訂之經典亦屬此類性質或由印成之本聯帶收入多按分出列目見本說明六非同本合訂之經典更屬藏外按其性質與藏內經典有關者依次編入各函并隨目注明如宏覺忞禪師北遊集編入續七二函宏覺忞禪師語錄之後牧雲和尚宗本投機頌及病遊草編入又續第四函懶齋別集之後如此庶便閱讀凡所編入與有關各書版式大抵相同可見同時雕造所謂藏外或者後期覓得或者漏未列目各函無可編入者列於全藏之後是為藏外所增善本其他部類各書有注明嘉興藏本者當係根據書末所記而其書或為各目所不載如雲棲法彙布水臺記鶴山禪師執帚集等不知何以未列藏外既不見於各目今亦未便更張惟有按其性質編入續藏雲棲法彙不全改印他本餘者所注嘉興藏本原書可按亦不逐一注明九續藏又續藏分出所增別目所增藏外所增共八十一目原目四百三十八部加此增目共五百十九部此為釐訂續藏又續藏包括未入藏部數連同正藏共二千一百八十八部十正藏原目注明缺四經善本祗缺其一見通例六此亦證明善本不屬原目惟於其他各目缺佚仍多今逐目詳覈應印行者如適值缺本除原缺番字藥師經無可覓補不列印行編號外餘皆以黃檗藏或單行本補印列入印行編號隨目注明因黃檗最為接近嘉興駒本且以之為正藏也續藏善本缺佚尤多駒本較為完備合併各目以駒本補善本之不足其駒本亦佚或未佚而版刻不如單行本者以單行本付印又駒本遠在異邦通函攝影不無缺行失頁之虞檢覈既難縝密補正尤費周折此草創目錄雖已標明駒本其見於後輯者并標明後輯函號之一多為卍續函號惟淨土十要單本為大正編號正式付印時儘可能予以校補其不見後輯無可校補者惟以空格代替異日若能獲睹原本當另出補校記讀者諒之十一善本與駒本頗有異同如續八六函駒本天王水鑑海和尚六會錄十卷各目皆同而善本所收為五會錄六卷及住金粟語錄三卷合之適為六會內容編排不同駒本自為正目善本以藏外編次於後又有經名相同而內容不同者如續八七函吹萬禪師鐵壁禪師兩語錄善本所收皆三卷本駒本所收皆二十卷本內容頗有出入茲以善本為正目駒本編次於後此皆偶然發現如能將兩藏內容逐部核對所得必多事實障礙有待來茲又善本藏外與藏內亦有此情形前已舉宏覺忞禪師語錄牧雲和尚宗本投機頌之例又如續七十函善本出覺浪禪師語錄十二卷又續十六函又出全錄八卷藏外復有嘉禾語錄一卷茲并印行以嘉禾語錄次全錄之後又如續七八函善本出雪關禪師語錄藏外亦有同名一為十三卷一為六卷內容頗有出入茲以十三卷本為藏內而次六卷本於後餘可類推十二嘉興兩續所收經書最晚為雍正末年所刻此可推定兩續停編之年惟藏外本牧牛圖頌為乾隆年刻當屬後期補入今編入續五七函與原目牧牛圖頌相次十三嘉興正藏新目一千六百六十八部除惟函原缺一部無可配補外不見於前輯及新編續藏者於目錄上端欄外編號為印行標記包括斯函曠遠函治本於函各缺一部以黃檗藏或單行本配補共影印一百六十一部兩續及藏外新目五百二十部除去重出及缺本見於後輯或無可配補外以善本為主輔以駒本及單行本共影印四百九十四部總計正續藏新目二千一百八十八部包括異本共影印六百五十五部中華大藏經第二輯嘉興藏校訂對照目錄大乘經般若部天字至柰字第一函至第十五函大般若波羅蜜多經六百卷唐玄奘譯唐太宗通序唐高宗記每會玄則序磧天至柰菜字至鹹字第十六函至第十七函菜重芥放光般若波羅蜜多經三十卷西晉無羅叉共竺叔蘭譯磧菜重芥薑海鹹摩訶般若波羅蜜經三十卷姚秦鳩摩羅什共僧叡譯磧薑海鹹河淡鱗第十八函河字光讚般若波羅蜜經十卷西晉竺法護譯磧河淡補錄淡字道行般若波羅蜜經十卷後漢支婁迦讖譯補錄晉道安序磧鱗鱗字小品般若波羅蜜經十卷姚秦鳩摩羅什譯僧叡序磧潛潛羽翔第十九函潛字摩訶般若波羅蜜鈔經五卷苻秦曇摩蜱共竺佛念等譯磧淡大明度無極經六卷吳支謙譯磧羽羽字勝天王般若波羅蜜經七卷陳月婆首那譯磧羽補錄金剛般若波羅蜜經一卷姚秦鳩摩羅什譯原標三譯分上中下卷今分出後二目補錄明太宗序卍五曷有補錄金剛般若波羅蜜經一卷元魏留支譯磧翔金剛般若波羅蜜經一卷陳真諦譯有題記磧翔翔字能斷金剛般若波羅蜜多經一卷唐玄奘譯原標二譯今分出後目磧翔能斷金剛般若波羅蜜經一卷唐義淨譯磧翔金剛能斷般若波羅蜜經一卷隋笈多譯磧翔佛說濡首菩薩無上清淨分衛經二卷亦名決了諸法如幻三昧劉宋翔公譯磧翔仁王護國般若波羅蜜經二卷姚秦鳩摩羅什譯磧翔實相般若波羅蜜經一卷唐菩提流志等譯磧翔摩訶般若波羅蜜大明咒經一卷姚秦鳩摩羅什譯磧翔補錄般若波羅蜜多心經一卷唐玄奘譯補錄明太祖序唐慧忠序磧翔文殊師利所說摩訶般若波羅蜜經一卷梁曼陀羅尼僊譯磧翔文殊師利所說般若波羅蜜經一卷梁僧伽婆羅譯磧翔寶積部龍字至字字第二十函至第二十二函大寶積經一百二十卷唐菩提流志譯唐睿宗序徐鍔序磧龍至字乃字至推字第二十三函乃字大方廣三戒經三卷北涼曇無讖譯磧乃佛說無量清淨平等覺經三卷後漢支婁迦讖譯磧乃佛說阿彌陀經二卷吳支謙譯磧乃佛說無量壽經二卷曹魏康僧鎧譯磧乃服字佛說阿閦佛國經三卷後漢支婁迦讖譯磧服佛說大乘十法經一卷梁僧伽婆羅譯磧服佛說普門品經一卷西晉竺法護譯磧服文殊師利佛土嚴淨經二卷西晉竺法護譯磧服佛說胞胎經一卷西晉竺法護譯磧服佛說法鏡經二卷後漢安玄共嚴佛調譯康