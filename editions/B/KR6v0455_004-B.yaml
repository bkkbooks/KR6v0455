body:
  text: 中華大藏經第三輯日本卍字正續藏編目說明一中華大藏經第三輯影印日本卍字正續藏而除去已見於前二輯者二日本寶永年間獅谷法然院忍澂上人以麗藏校北藏歷時五年而畢明治三十五年清光續二十八年京都藏經書院重加纂定以活字印行三十八年出版是為卍字正藏始不用千字文函號分裝三十六套每套十冊第一套目錄二冊第三十六套五冊經目畧依北藏經文則從麗藏間有從北藏者如第十二套蘇悉地羯囉經經名卷數以麗藏為主北藏不同者分注於下北藏所無亦依麗藏稍有增補如第十套申日經惟北藏續編三十六部卷末附錄五部及麗藏五十五部皆未收入旋於大正元年完成續藏分為二編第一編九十五套第二編三十二套第二編乙二十三套每套皆五冊目錄在外網羅散佚不惟北藏麗藏盡收無遺且有中土之孤本絕版因而重見於世民國十二年我國商務印書舘曾仿印流通今就正續目錄重行校訂除去已見於第一二輯者影印為中華大藏經第三輯三卍字正續藏每冊各冠佛像一幀正續祗分二式續藏冊尾有韋陀像一幀今皆照印新輯每冊首尾經書頂格眉注亦皆照印惟續藏每卷末頁迴向靖國死難人名從畧四卍字正續藏原編目錄以冊數為主故較長經書一目屢見今依前兩輯之例校訂新目改為一經一目其一經而涉二套或二冊以上者合併其套數冊數朝代譯著等有關注說亦與前兩輯改歸一律正藏目錄原注北藏不同之經名卷數從畧正藏存目之經計入部數如第七套第一冊無盡意菩薩經續藏副目不計入部數參見本說明十一五昭和法寶總目錄編號卍字正藏一千六百二十二目今校訂為一千六百二十六目凡增四目計為十四套第二冊枯樹經目錄失載昭和亦未編號今為增入二二套第五冊大乘起信論二譯經文分出而目錄合列今為分出三一套第五冊大慧覺禪師普說法語及書卷數銜接昭和編為一目今援十九套第五冊根本說一切有部尼陀那目得迦之例且便與嘉目對照擇印增列二目以上共增四目他如十二套第八冊甘露經陀羅尼咒與甘露陀羅尼咒縮刻成函大正密教部皆作二目惟本藏前咒無尾題目錄作一目姑以後咒為附錄按一目計前咒依嘉興念函標題無呪字見第二輯後咒依縮刻成函見第四輯又十六套第四冊一字奇特佛頂經與一字頂輪王念誦儀軌後目不題譯人本為附錄性質磧砂尹函二目嘉興不函一目本藏前經已有尾題及大藏都監奉勒雕造字樣是已按二目計而目錄作一目今亦以後目為附錄按一目計此經軌已見第一輯凡此皆為保持原目減少紛更六卍字諸經取於麗藏者達十分之九以上每卷後有某年高麗國大藏都監奉勒雕造字樣偶有脫漏者可以推知如四分律末卷麗藏之文為世所重日本縮刻藏大正藏皆以麗本為主別本附著於後頻伽仿縮刻而刪去校勘然縮刻大正兩藏校勘時未見磧砂嘉興嘉興固與北藏大同磧砂則與宋元各藏偶有不同本藏以磧砂為第一輯嘉興為第二輯於磧嘉兩藏之異本自應續出又縮刻大正所出別本非取其異文較多乃因其校勘較難如四願經本藏十四套麗藏較他藏減千八十五字普賢金剛薩埵畧瑜伽念誦儀軌本藏二七套麗藏較他藏減千三百餘字光讚經本藏第五套麗藏較他藏多二卷福力太子因緣經本藏十五套麗藏較他藏多一卷異文雖多皆於校勘中一言可決故不出別本若其他各經雖僅歧出數十百字而散在全經校勘不勝其記故另出之在縮刻大正兩藏附有校勘減者注明增者附記是固可以無憾本藏不附校勘若分出異本全依縮刻大正兩藏如前舉四願普賢光讚福力各經已見第一輯後輯不復刊載則麗本之增減讀者即無研究之機會是不能不引為遺憾因此本藏分出異本不以縮刻大正兩藏所著別本為限並於增出序跋題記或經末續出佚文偈咒者加以補錄前舉四願普賢二經屬於異本之例見通例五光讚福力二經屬於補錄之例見通例十一似此異本及補錄倉促付印漏畧實多且此異本之印出偏於小本經典大本則必須出入較多始為複印如大般涅槃經卷七有三百四字異文本藏第八套因此三百四字之文複印四十卷之經似有困難異文截出不易說明又甚難盡列補錄列補錄若能如縮刻大正兩藏之輔以校勘而稍變其例經書不問何藏惟取善本而記其異同於後不惟補錄部份悉入校勘即異本部份亦有可改著校勘者顧茲事之難細若繭絲縮刻大正兩藏悉以麗本為主日本學人前後相承罄數十年之功力尚未能一無遺誤今者改主磧砂而又補以嘉卍各藏改絃更張其難倍蓗異日若有大心開士眾志成城或可彌此缺憾也七各藏出家緣經大正七九一麗卍不載另出出家功德因緣經譯人相同內容全異固未可認為別本然大正祗於出家緣經校合注麗無此經而於出家功德因緣經竟未收載以大正之重視麗本百密不免一疎今依磧砂無函出出家緣經依卍字十四套出出家功德因緣經以補大正之闕八卍續目錄分為第一編某套第二編某套第二編乙某套既近拖沓且易混淆茲畧其編次於第一編某套稱續某套或逕稱某套第二編某套稱續甲某套或逕稱甲某套第二編乙某套稱續乙某套或逕稱乙某套期於簡明易曉凡有引述皆准此例九卍續甲十三淨土十套要係節本其足本散見嘉興正續藏於第二輯照印西齋淨土詩見於閱藏知津有目無書亦別求善本於第四輯照印乙二三套大通方廣懺悔滅罪莊嚴成佛經卷上大正另出三卷本亦同十卍續目錄於每一經書之目錄科文卷首附錄多立專目致一書有三四目之多既違目錄原則又與各輯未能一律但若予以合併則總計部數懸殊不惟繁於注說而新目有無遺漏亦難察覈是以姑仍其舊其目錄科文往往不著撰人自係出於慎重惟若係後人補輯例應題名或注明其未題名注明者自係與正文同作今於可以推定者略有補充餘悉仍舊十一卍續目錄於正目之外有副目性質可分七種一為標名相同已收於別套之經書其內容與本套部類有關列為存目者如乙二三套收圓覺經佚文又於第一套存目二為標名不同已收單本而又出其合本存目者如續五八套收四十二章經解又於本套出三經解存目三為標名不同已收合本而又出其單本存目者如續五八套收閱經十二種又於別套分出每種存目四為已收注本而又出其原本存目者如甲十套收釋門歸敬儀通真記又於本套出釋門歸敬儀存目五為本藏雖未收正文而存其序跋附錄者如續三九套金剛經疏記會編六為本藏已收正文而又補其序跋附錄者如甲三套相宗八要解七為已見正藏或前目而又補其缺文者如續九五套俱舍論頌疏以上前四種為存目後三種有文可出校訂新目第一種刪除第二至四種以存目性質彙附目錄之後祗第五種第六種隨正目加標附存二字第七種隨正目加標後目二字除已見前輯於下欄注明函號不再影印外餘皆於上欄外加標補錄二字依次影印仍依原例不編號碼亦不計入部數十二昭和法寶總目錄卍字續藏編號一千六百五十九目頗多訛誤如一經一號為基本原則而續三套毘沙門天王隨軍護法真言與毘沙門儀軌二目同號少編一號甲六套宗門尊祖議注明出佛祖統紀援本套止觀坐禪法要記之例自屬副目但既出全文應以正目論少編一號甲二套五保寧仁勇禪師語錄已出全文注語要收入續古尊宿語要上脫語要二字少編一號續三九套金剛經宗通九卷末二卷誤列專目甲二六套無準師範禪師語錄六卷末卷誤列專目各多編一號副目無書例不編號而續三八套金剛經集解續六四套四分比丘戒本甲二五套龍門清遠禪師語錄甲三一套隱山燦禪師語要乙一五套五燈會元補遺各多編一號卷首列入目錄例編專號如續五一套法華授手卷首而續七二套起信論疏記會閱卷首在會閱前少編一號已見前目而後目補出缺文者例不編號如續九五套俱舍論頌疏而甲四套以十二卷本四教義補正藏三三套本書缺文甲二五套百丈懷海禪師廣錄已見古尊宿語錄一惟錄卷末所缺者各多編一號他如乙二三套圓覺經佚文阿彌陀經異本係後期發現以正目論不在此例不載正文止存序跋目錄凡例者例不編號如續五九套副目科南本涅槃經而續九五套判比量論甲三二套宗門寶積錄各多編一號續九二套大寶積經述雖亦序文性質因出以正目形式姑仍其舊以上悉予校改多少相抵減編七號作一千六百五十二號正續合併為三千二百七十八號十三校訂卍字正藏目錄一千六百二十六部不見於前輯及新編續藏者六十一部續藏目錄一千六百五十二部不見於前輯及新編續藏者一千二百七十六部總計正續藏三千二百七十八部包括異本共影印一千三百三十七部內有全部重出一部局部重出二部見通例八補遺珍缺文九部見通例七其補嘉續缺本因嘉續未計入印行部數故亦不計中華大藏經第三輯日本卍字藏校訂對照目錄大乘經般若部第二套第一冊至第四套第十冊按第一套為總目大般若波羅蜜多經六百卷唐玄奘譯唐太宗通序唐高宗記每會玄則序磧天至柰嘉天至柰第五套第一冊至第三冊放光般若經二十卷西晉無羅叉譯磧菜重芥嘉菜重芥摩訶般若波羅蜜經二十七卷後秦鳩摩羅什譯磧薑海鹹嘉薑海鹹第五套第四冊至第六冊補錄光讚經十卷西晉竺法護譯分卷不同前八卷即磧嘉十卷補錄第九卷第十卷凡六品磧河淡嘉河道行般若經十卷後漢支婁迦讖譯磧鱗嘉淡小品般若波羅蜜經十卷後秦鳩摩羅什譯僧叡序第一卷首題摩訶般若波羅蜜經第二卷以下首題小品般若波羅蜜經各卷尾題皆作小品般若經磧潛嘉鱗摩訶般若鈔經五卷亦名長安品秦曇摩蜱共竺佛念譯磧淡嘉潛大明度經六卷南吳支謙譯尾題作明度經磧羽嘉潛勝天王般若波羅蜜經七卷陳月婆首那譯磧羽嘉羽金剛般若波羅蜜經一卷後秦鳩摩羅什譯補錄經末所附真言三十五字嘉羽另有補錄磧翔嘉羽金剛般若波羅蜜經一卷元魏菩提流支譯磧翔嘉羽金剛般若波羅蜜經一卷陳真諦譯磧翔嘉羽能斷般若波羅蜜多經一卷唐玄奘譯磧翔嘉翔佛說能斷金剛般若波羅蜜多經一卷唐義淨譯磧翔嘉翔金剛能斷般若波羅蜜經一卷隋笈多譯磧翔嘉翔佛說濡首菩薩無上清淨分衛經二卷一名决了諸法如幻化三昧經宋翔公譯磧翔嘉翔佛說仁王般若波羅蜜經二卷姚秦鳩摩羅什譯磧翔嘉翔實相般若波羅蜜經一卷唐菩提流志譯磧翔嘉翔摩訶般若波羅蜜大明呪經一卷姚秦鳩摩羅什譯磧翔嘉翔般若波羅蜜多心經一卷唐玄奘譯磧翔嘉翔文殊師利所說摩訶般若波羅蜜經二卷梁曼陀羅僊譯磧翔嘉翔文殊師利所說般若波羅蜜經一卷梁僧伽婆羅譯磧翔嘉翔寶積部第五套第七冊至第六套第二冊大寶積經一百二十卷唐菩提流志等譯唐睿宗序磧龍至字嘉龍至字第六套第三冊大方廣三戒經三卷北涼曇無讖譯磧乃嘉乃佛說無量清淨平等覺經四卷後漢支婁迦讖譯磧乃嘉乃佛說阿彌陀三耶三佛薩樓佛檀過度人道經二卷吳支謙譯下卷首題及上下卷尾題皆作阿彌陀經磧乃嘉乃佛說無量壽經二卷曹魏康僧鎧譯磧乃嘉乃阿閦佛國經二卷後漢支婁迦讖譯磧服嘉服佛說大乘十法經一卷梁僧伽婆羅譯磧服嘉服佛說普門品經一卷西晉竺法護譯尾題無經字磧服嘉服異本文殊師