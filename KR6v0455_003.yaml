春翔序杜臻序卍續乙十八依駒本印善一純禪師語錄三卷續錄一卷清如純說學正錄胡國翰序超嶼序有行實南嶽下第三十八世嗣善權位依駒本印善權位禪師語錄二卷清達位說大悅等編吳之瑋序有行實塔銘南嶽下第三十七世嗣月幢了依駒本印天一悅禪師語錄一卷清大悅說學愚錄有塔銘南嶽下第三十八世嗣善權位駒附前錄不列專目今依原目分出依駒本印又續駒目第四十四套空谷道澄禪師語錄二十卷清道澄說德儒編王文南序卷十五有行由行狀南嶽下第三十六世嗣敏樹相依駒本增入并印大博乾禪師語錄五卷清乾說超宗等錄相空子序曹溶序南嶽下第三十五世嗣萬如微依駒本增入并印盤山朗空順禪師語錄一卷清順說寶性錄南嶽下第三十七世嗣了宗見附了宗見禪師法嗣瑞亭晟法孫美亭義略錄依駒本增入并印盤山了宗禪師語錄四卷清超見說徹凡心月等錄楊雍序魏裔介序南嶽下第三十六世嗣大博乾依駒本增入并印缺卷二逕庭宗禪師語錄二卷清德宗說行謙等編唐正發序蔣肇序有塔銘附疑山握中符禪師塔銘青原下第三十九世嗣握中符依駒本增入并印別牧純禪師語錄一卷清純說福月等編慧輅序有行實青原下第四十世嗣逕庭宗依駒本增入并印天翼翔禪師語錄二卷清巨翔說寂乾錄際鋒等編羅人琮序陶之典序有行實南嶽下第三十八世嗣古梅冽駒附前目之後今分出增入并印雲山燕居申禪師語錄八卷清申說合喆等編潘應斗序南嶽下第三十五世嗣破山明依駒本增入并印卷一末卷二首及卷五以後皆有缺文昭覺竹峯續禪師語錄六卷清真續說實悟德紀編周輔泰序周又英序周飛熊序王前驅序南嶽下第三十七世嗣佛冤綱附德雲悟禪師語錄清實悟說性滿錄南嶽下第三十八世嗣竹峯續依駒本增入并印又續駒目第四十五套一貫別傳五卷清廣真著并序馬易從小引慧澤跋分論三教筆記依駒本增入并印古音王傳一卷清廣真著并序古心評并序黃毓英評元善評前有船子曲燈輝集慧澤序全書皆寓言依駒本增入并印五家宗旨纂要三卷清燈來纂并序性統編卍續甲一九依駒本增入并印竺峯敏禪師語錄六卷後錄二卷清幻敏說性鉅性湛性珩性濟等編至善序卷六杜臻序有塔銘行狀南嶽下第三十世嗣慶忠機依駒本增入并印野雲映禪師宗統頌一卷清燈映頌性燦錄有塔銘行狀由南嶽一世至鐵壁機三十世并南嶽計入為野雲所得法也依駒本增入并印普門顯禪師語錄二卷清燈顯說性胤錄汪賀勛序有塔銘南嶽下第三十世嗣慶忠機依駒本增入并印鑑堂一禪師語錄一卷清一說明滿明慧等錄杜允貞序南嶽下第三十一世嗣竺峯敏依駒本增入并印翠崖必禪師語錄三卷清必說道通錄屠粹忠序曹廣端序南嶽下第三十二世嗣別庵統依駒本增入并印斗南暐禪師語錄二卷清暐說普潤法權等錄楊雍建序南嶽下第三十二世嗣別庵統依駒本增入并印又續駒目第四十六套博山無異禪師廣錄三十五卷明元來說清弘瀚弘裕編集趙士禎序吳應賓序黃端伯序劉榮慶序張瑞圖序有傳及塔銘續七八有語錄集要卍續甲一七有警語此見卍續甲三十依駒本增入并印博山粟如禪師語錄六卷清弘瀚說傅鵬編并後序淨符序有像贊行狀塔銘塔院記青原下第三十七世嗣雪磵奉依駒本增入并印藏外餘經國立中央圖書舘藏外經書已按其性質及版式隨函編入正續藏餘者彙附於此見編目說明八天寧法舟濟禪師剩語一卷明道濟撰如淵等編圓信跋有行狀南嶽下第二十九世嗣吉庵祚萬峯和尚語錄一卷明時蔚說普壽編宗泐序法藏跋有塔銘及傳附三玄原頌慧旵禪師塔銘南嶽下第二十四世嗣千巖長磬山牧亭樸夫拙禪師語錄六卷清拙說光模等編有像贊李焞序附洞虛禪師塔銘雨山和尚語錄二十卷清上思說有塔銘南嶽下第三十七世嗣巨渤恒天然居士懷淨土詩一卷清朱道則撰明康錄賴序宜碞序冶堂序濟玹序鮑訓序孫潤跋丁之溶跋超機跋古楳穎題辭有小傳成唯識論音響補遺十卷明紀覺音義新伊合響清智素補遺并序金之俊序沈志禮序何振玉跋邵三捷跋科二卷見卍續八二並有補錄
