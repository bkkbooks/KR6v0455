body:
  text: 中華大藏經總目録編目說明一中華大藏經總目録分為四類一本藏目録二基本目録三有關目録四參考目録各目之前不需總目二本藏目録即中華大藏經首編三基本目録為中華大藏經選藏四輯之原始目録及有關著作第一輯為磧砂藏首冊宋藏遺珍敘目并附録第二輯為刻藏緣起嘉興藏目録藏版經直畫一目録中央圖書館善本目録日本駒澤大學藏本目録第三輯為日本卍字正藏卷首及續藏卷首第四輯為開寶崇寧毗盧圓覺資福南藏龍藏天海縮刻頻伽大正指要標目至元義門知津各目録四有關目録為二十四種目録見本說明十除去已列為基本目録者五參考目録為歷代中外足資參考之目録六基本目録及有關目録已見各輯者略出全文存目注明參考目録不著七各藏目録之前刊載歷代序文多已見於磧卍各經而卍字縮刻頻伽各藏亦多重復茲皆照印以見藏目之全八各輯經目下標寫序跋人名及附録以便檢索惟總目録各目出自原本者或多至不勝標寫出自昭和總目者又多刪除無從檢索今悉不著九總目録各目出自昭和總目者基本目録及有關目録皆有固定範圍參考目録惟以華人著作未見於各輯者及日本仿照華人古藏就各寺現存經典輯成之目録非特刻一藏為限或所録之經現在中國庋藏及關於中國掌故者亦附於後十本會曾印行三十一種藏經目録對照表解收入日本就各寺經目輯成之目録八種又加入金藏為三十二種各標二字簡稱以便引述後因日本輯目經典皆各藏所已見改從簡略定為二十四種茲列日本輯目八種於參考目録但於三十二種之二字簡稱仍注於各目之下以便印證餘見第四輯編目說明三十一各目録之影印極力訪求原本其無法獲得原本者由昭和總目仿印見於各藏者先儘各藏印出仍列目備檢凡昭和總目所載雖印原本仍記昭和編號以便考查中華大藏經總目録目録本藏目録中華大藏經首編不分卷基本目録影印宋磧砂藏經首冊磧乙不分卷原本鉛印二冊宋藏遺珍敘目金藏一卷原冠宋藏遺珍之前宋藏遺珍敘目金藏一卷單行本附金藏雕印始末考及簡目新增附録一卷刻藏緣起嘉興一卷民國八年揚州藏經院木刻一冊嘉興藏目録嘉興一卷民國九年北京刻經處木刻一冊縮刻結函標為大明重刊三藏聖教目録有正無續不載經直藏版經直畫一目録嘉興一卷昭和總目二八與前目同以為甲本與各本對校嘉興楞嚴寺方冊藏經現存目録嘉興一卷國立中央圖書館善本書目甲編卷三子部釋家類大明三藏聖教目録一卷正藏係日本黃蘗藏目録續藏又續藏係抄本與前二目兩續稍有出入日本駒澤大學藏大日本校訂大藏經目録卍字一卷原本附索引目録部類目録各一卷鉛印二冊昭和總目三四大日本續藏經目録卍續四卷原本鉛印一冊昭和總目三五開元釋教録略出開寶四卷唐智升撰見第一輯磧砂英函磧英崇寧萬壽大藏目録崇寧一卷昭和總目七即東寺經藏一切經目録毗盧大藏經目録毗盧一卷昭和總目六即宮內府圖書寮一切經目録湖州思溪圓覺禪院新雕大藏經律論目録圓覺二卷昭和總目四六安吉州思溪法寶資福禪寺大藏經目録資福二卷見第四輯資福最函昭和總目一一資最大明三藏聖教南藏目録南藏一卷見續藏史地類金陵梵剎志昭和總目二九續藏大清三藏聖教目録龍藏五卷見第四輯龍藏機函昭和總目三龍機大清重刻龍藏彙記龍藏不分卷較前目增記板數連數同治九年金陵刻經處木刻一冊日本武州江戶東睿山寬永寺一切經新刊印行目録天海五卷見第四輯天海最函昭和總目三一天最大日本校訂縮刻大藏經目録縮刻一卷原本鉛印一冊昭和總目三三頻伽精舍校刊大藏經總目頻伽一卷原本鉛印一冊大正新修大藏經總目録大正不分卷昭和總目一續大正新修大藏經總目録大正不分卷昭和總目三九大藏經綱目指要録指要八卷宋唯白集見第四輯崇寧溪函昭和總目三七誤標十三卷崇溪大藏聖教法寶標目標目十卷宋王古撰并序偈元管主八續集見第一輯磧砂遵函昭和總目三八磧遵至元法寶勘同總録至元五卷元慶吉祥等集見第一輯磧砂盟函昭和總目二五磧盟大明釋教彙目義門義門四十五卷明寂曉撰集民國二十年二十五年天津刻經處木刻十冊閲藏知津知津四十八卷明智旭編次見第二輯嘉又續六昭和總目七四嘉又續有關目録杭州路餘杭縣白雲宗南山大普寧寺大藏經目録普寧四卷見第四輯縮刻結函昭和總目二六縮結平江府磧砂延聖院新雕藏經律論等目録磧甲二卷見總目録影印宋磧砂藏經首冊附録昭和總目一二本目録大明三藏聖教北藏目録北藏四卷昭和總目二七大藏目録麗藏三卷見第四輯縮刻結函昭和總目二二縮結參考目録大中祥符法寶録略出一卷民國支那內學院由宋趙安仁楊億等所編原録略出二十三年內學院木刻一冊景祐新修法寶録略出一卷民國支那內學院由宋呂夷簡等所編原録略出內學院木刻一冊御譯大藏經目録一卷清高宗序題清文翻譯大藏經昭和總目一七如來大藏經總目録一卷清聖祖序題番藏經昭和總目一八日本石山寺一切經目録石山二卷昭和總目一四日本唐本一切經目録唐甲三卷昭和總目四八日本知恩院一切經目録知恩一卷昭和總目十日本上醍醐寺一切經目録醍醐二卷昭和總目九日本南禪寺經藏一切經目録南禪一卷昭和總目八日本唐本一切經目録唐乙三卷昭和總目二三日本三緣山輪藏目録三緣二卷昭和總目二四日本緣山三大藏目録緣山三卷昭和總目二一燉煌本古逸經論并古寫經目録一卷昭和總目一九扶桑藏外現存目録一卷日本浪華鳳潭録昭和總目三六大藏搨本考一卷日本南溪徹定著昭和總目七六敦煌劫餘録十四卷民國陳垣編十九年自序陳寅恪序歷史語言研究所藏西藏大藏經總目録不分卷日本宇井伯壽鈴木忠宗金倉圓照多田等據德格版校訂佛典泛論一卷民國呂澄著十八年商務印書館鉛印一冊刊印中華大藏經首編書後中華大藏經第二輯刊印未竟先以首編付印首編重在目録目録根據內容本藏之內容果確定乎今試分而論之首言正藏四輯旨在彙合歷代已入藏之典籍第一輯已印磧砂藏及宋藏遺珍第二三四輯期於不重不缺其事至為瑣細各藏原本皆有主者甚難外借或久借草創目録時各處披尋零星札記甚多當時容易解決之問題因無書可檢數月不決勞多功鮮難免訛誤至於綜合補録目録備檢所舉擬行補録各條有待重核者又其小焉者耳次言續藏旨在彙合歷代未入藏之典籍時局動蕩文物凋零十年以來雖已搜羅少許孤本善本而海內外私家祕藏為數仍多或已列入者人事變遷無從借印或未列入者因緣巧合居然獲得此一事也至於近人著作偶有編入選擇亦難精審重加斟酌不無去取此又一事也所收大應語録與縮刻霜函重復至印行三校後始發現有待刪除他如宗本梅花詩亦有重復可能尚須詳校此又一事也乃至譯藏尚未充實總目録仍須覆核更不待言是全藏未盡刊行目録亦永難確定今以公開宣布除一二兩輯業已刊印外閲者對三四兩輯及續藏譯藏總目録之編訂尚可及時指示某書重某書缺某書應增某書應減以及核對未周排列未善俾得有所修改因革損益期於至當庶不失集思廣益之義在昔大正藏印行期間曾刊布目録余為會員之一獲得一冊猶憶其擬印各經與後來實際印出者頗有出入是必有其必須變更之原因今日從事編目始能深會此意首編擬收各目惟第一輯重訂補頁表目録通檢發起人及職員名簿功德徵信録附收支對照表請藏功德録暫不刊印補頁表曾於第一輯完成時刊印單本分贈訂戶邇者本會有重印第一輯之議若能實現余擬建議每頁每格標注原影印本某頁則讀者檢閲原補頁表為已足此重訂之表自無需要至其餘各件須全藏印竣始能完備故亦暫付缺如首編易稿數次抄寫仍甚凌亂民國五十七年二月付印歷時將及一載余久患心臟病在此期間尚能力疾校對雖未精確仍深感於三寶加被因並識之中華民國五十七年歲秒書於臺中寓廬遼東蔡運辰
