body:
  text: 中華大藏經第四輯編目說明一中華大藏經第四輯就十三種藏經見本說明三至五中未見於前三輯及新編續藏者悉行列入二經書正文及補録已見前輯本輯或新編續藏而又有標名不同或分合不同者於各藏之後附記存目注明卷數朝代著譯人名函號或編號并已見何藏何函前藏指排列在前已記者後則從略望而易知者不記三本會前輯三十一種藏經目録對照表解業已印行為修訂中華大藏經基本資料後又加入金藏為三十二種其簡名為開寶崇寧毗盧圓覺資福磧砂甲端平目録普寧磧砂乙影印目録金藏南藏北藏嘉興龍藏麗藏天海縮刻頻伽卍字石山唐本甲知恩醍醐南禪唐本乙三緣緣山指要標目至元義門知津大正續藏只計古逸疑似兩部就中石山至緣山八種乃日本各大寺廟就其所藏藏本經典輯成昭和法寶總目録刊載目録而其藏經並非經過雕印換言之只此一部而無別本此八種中只石山藏目録羽函載有後加入之金剛經佚名注心經寶月譯二種為各藏所未收曾由修訂中華大藏經會顧問蔣君輝居士親至石山寺查閲則此特有二經皆所未見只有法月譯普遍智藏般若波羅蜜多心經及般若譯般若波羅蜜多心經兩舊抄本經與縮卍大正各藏詳加核對各藏於法月譯本題為重譯經文稍有出入於般若譯本題為共利言譯經文只有數字之差是則法月本近似初譯而般若本或由鈔寫不同未可認為異本惟兩經皆不在石山藏目録之內今以法月本編入續藏並記般若本概略於此以備後賢參考八種輯成藏目既無特出經典擬將三十二種對照表解改編為二十四種而此二十四種目録中磧砂乙本嘉興正續卍字正續為本藏第一二三輯所依據金藏今日所見者祗影印宋藏遺珍亦見第一輯並由第三四輯補其缺文遺珍以外金藏目録可考者皆已散見他藏見總目録所載宋藏遺珍敘目增附金藏目録校釋除此四種所餘二十種減去已見於前三輯及新編續藏者是為本藏第四輯四二十種藏經對前三輯及新編續藏亦或根本無特出經典及附記存目或雖有特出經典及附記存目而數藏叠見只取其一斟録所及只有十六種而此十六種藏經今日在臺港各地有藏可見者祗龍藏縮刻頻伽大正四種頻伽祗補録及附記存目其餘十二種僅可查考目録其中包括指要標目至元義門知津五種原係目録之書固不待言五十六種藏經之排列順序為開寶崇寧毗盧圓覺資福南藏龍藏天海縮刻頻伽大正指要標目至元義門知津除開寶毗盧圓覺祇附記存目外餘十三種録出應印行者之正本及補録龍藏縮刻頻伽大正皆以原藏影印或排印餘者儘可能覓借藏本或單行本影印或排印隨目注明何本或缺本其屬於指要標目至元義門知津者原為缺本偶有補充列於上欄外印行編號餘亦不注缺本六各藏迭見之經書依前述次序由排列在前之藏本著録但同在一輯不無變通如千手千眼觀自在菩薩根本真言釋見於崇寧本會向日本洽商影印者為毗盧本重行洽印太費手續祇可照印仍列於崇寧藏內注明毗盧藏本此外後期藏本所收文義較備或以類相從者則依後期藏本影印如宋太宗御製祕藏詮等已見崇寧今依縮刻印行一切經音義已見縮刻頻伽重校未畢有待覆勘故仍依縮刻印行而由頻伽補録序文七每藏著録數部以上者皆標明原藏部門僅著録二三部或原藏不著部門者從略八大正續藏只計古逸疑似兩部餘皆日人著作華人赴日宏法者目録亦注日本卷帙繁多偶見於縮刻藏餘藏皆未著録日本佛學自成系統不宜全部編入因而從略仍擇其與中國傳承較近者編入續藏若干種見續藏編目說明十五圖像及昭和法寶總目皆大正創例本藏無圖像部只取總目所載目録一部人分補印各藏缺本並編入總目録見總目録編目說明十一九每一經書注明卷數朝代譯著人名並本藏之函號或編號卷數大正注編號義門知津注卷數及有關事項其朝代譯人及失譯參照大正勘同標寫十大正收經較多且於後出各經排列具有深意本輯各經見於大正者雖由他藏斟録亦附記大正編號以便考察十一大正古疑疑似兩部偏重異本不甚注意重出今略加斟校凡知其已見前輯或本輯者不論標名同異概入附記未知者留待後賢考察十二本輯共著録四百四十六部除缺本無可配補外包括異本共印行四百部內有補卍續乙二三缺文一部見通例七中華大藏經第四輯目録開寶藏准開元録略出附記根本說一切有部尼陀那目得迦十卷唐義淨譯尊函磧尊函分二目大正一四五二崇寧藏大藏經綱目指要録八卷宋唯白集溪函依昭和總目印菩薩名經十卷失譯衡函缺本千手千眼觀自在菩薩根本真言釋一卷唐不空譯回函依毗盧藏本攝印附記諸禮佛懺悔文一卷唐智升撰羣函磧羣函合入集諸經禮懺儀大正一九八二天聖廣燈録都帙目録一卷宋李遵勗編實函見卍續乙八天聖廣燈録卷首御製佛賦二卷宋太宗御製尹函縮霜函合入御製祕藏詮御製詮源歌一卷宋太宗御製尹函同上天台法華玄義科分五卷唐湛然述霸函見卍續四三法華三大部科文妙法蓮華經文句科六卷唐湛然述橫函同上摩訶止觀科文五卷唐湛然述橫函同上毗廬藏附記普賢行願品一卷唐般若譯頗函見嘉伏至遐函四十華嚴末品大正二九三李長者事跡一卷馬支纂頗函見嘉續九華嚴合論卷首大正一七三九無卷首四分律含注戒本疏四卷唐道宣述旦至營函卍續六二會入四分律含注戒本疏行宗記四分律刪繁補闕行事鈔科分一卷宋元照録旦至營函見卍續六九四分律行事鈔科大正一八四無科四分律刪補隨機羯磨疏八卷唐道宣撰旦至營函卍續六二會入四分律刪補隨機羯磨疏濟緣記釋金剛經纂要疏分一卷宋子璿録旦至營函見嘉農函金剛經疏論纂要大正一七一無科圓覺藏附記釋音精嚴記三卷宋處觀撰英函即磧英函之紹興重雕大藏音原名見日本緣山三大藏目録卷下資福藏大藏經目録二卷最函昭和總目作安吉州思溪法寶資福禪寺大藏經目録依昭和總目印南藏般若波羅蜜多心經集注一卷明宗泐如玘同集石函缺本北藏有注解無集注見閲藏知津缺本附記大明重刊三藏聖教目録三卷塞函昭和總目作大明三藏聖教南藏目録出金陵梵剎志四九見新編續藏龍藏此土著述大覺普濟能仁琇國師語録七卷清通琇說幾函明道正覺森禪師語録三卷清行森說幾函御選宗鏡大綱二十卷清世宗御選兩疏函御録經海一滴二十卷清世宗御選見機函大清三藏聖教目録五卷機函附記定慧相資歌一卷宋延壽撰郡函嘉素函附唯心訣後警世一卷宋延壽撰郡函嘉素函附唯心訣後日本天海藏新刊印行目録五卷最函昭和總目作東睿山寬永寺一切經目録依昭和總目印日本縮刻藏方等部大乘寶雲經七卷梁曼陀羅仙共僧伽婆羅譯宇函別本大正六五九此宋本元明麗本見磧木函磧木異本佛說睒子經一卷西秦聖堅譯宙函別本大正一七五別本一此宋本元明本見磧敢函麗本見卍十磧敢卍異本印度大乘宗經論補録集諸法寶最上義論二卷善寂菩薩造宋施護譯暑函大正一六三八補録忍徵校字存疑及增上寺麗本與忍師校本同異磧肥印度撰述雜部補録福蓋正行所集經十二卷龍樹菩薩集宋日稱等譯藏函大正一六七一補録忍澄校字存疑及增上寺麗本與忍師校本同異卍續祕密部受五戒八戒文一卷閏函大正九一六金剛峰樓閣一切瑜伽瑜祗經一卷唐金剛智譯閏函大正八六七各呪皆附梵字並附請來本與明本及靈雲校本異同磧武異本蘇悉地羯囉經三卷唐輸波迦羅譯附請來本與麗宋元明四本及靈雲校本異同閏函大正八九三別本二此日本請來本三十四品大正以校寶壽院本宋元明卍本三十八品見磧讚函嘉克函卍十二大正八九三別本一麗本三十七品見大正八九三磧讚大正異本補録回向輪經一卷唐尸羅達摩譯閏函大正九九八補録密呪梵字原附密呪異文出守護國界主陀羅尼經已見磧勿函此不録遺珍補録大孔雀明王畫像壇場儀軌一卷唐不空譯閏函大正九三八補録所附明王經及畫像壇場儀軌各本異同磧密補録大寶廣博樓閣善住祕密陀羅尼經三卷唐不空譯閏函大正一五補録經前呪輪嘉息大正一五另有補録磧時補録金剛光熖止風雨陀羅尼經一卷唐菩提流志譯閏函大正一二七補録所附靈雲校本與麗宋明三本異同磧羔卍異本悉曇字記一卷南天竺般若菩提悉曇唐智廣撰閏函大正二一三二大隨求八印一卷內題宗睿僧正於唐國師所口授餘函大正一一五六標目如內題青頸觀自在菩薩心陀羅尼經一卷唐不空譯日本乘無等題記餘函大正一一一一常曉和尚請來目録三卷餘函大正二一六三前有本寂撰雕入唐四家請來録序即以下四目大正不載此序新書寫請來法門等目録一卷日本宗睿撰餘函大正二一七四靈巖圓行和尚請來目録一卷本冊分目無靈巖二字內題無請來二字餘函大正二一六四慧運禪師請來教法目録一卷本冊分目無教法二字餘函大正二一六八一切如來心祕密全身舍利寶篋印陀羅尼經一卷唐不空譯日本快道題記餘函大正一二二此日本長谷寺本宋元明麗本見磧佐函縮閏函大正一二二大正補録磧佐異本金剛頂瑜伽護摩儀軌一卷唐不空譯日本快道題記餘函大正九九此日本長谷寺本宋元明麗本見磧衡函縮閏函大正九八磧衡異本金剛頂經一字頂輪王儀軌音義一卷唐不空譯縮不著譯人此從大正目録日本慈忍題記快道題記慈順題記餘函大正九五八補録攝大毗盧遮那成佛神變加持經入蓮華胎藏海會悲生曼荼擁廣大念誦儀軌供養方便會三卷唐善無畏譯餘函大正八五補録日本慧光刻密軌序大正另有補録卍續佛頂大白傘蓋陀羅尼經一卷元沙囉巴譯成函大正九七六甘露陀羅尼呪一卷唐實叉難陀譯成函大正一三一七卍十二附佛說甘露經陀羅尼呪之後佛說文殊菩薩最勝真實名義經一卷元沙囉巴譯沈明仁題記成函大正一一八九後附文殊所說最勝名義經宋金總持等譯各藏另目見磧砂更函大正一一八八此不重印禪宗天童密雲禪師年譜一卷清道忞編騰函按此係原本興嘉魚函語録後所附年譜經過修改者不同嘉魚異本護教部道宣律師感通録一卷唐道宣撰有麗藏題記露函大正二一七按與卍續律相感通傳大同大正並收卍續甲異本御製祕藏詮三十卷附佛賦詮源歌幽隱律詩懷感回文五七言詩宋太宗製并序霜函宋藏不附後三御製逍遙詠十一卷宋太宗製并序霜函御製緣識五卷宋太宗製并序霜函目録部大唐貞元續開元釋教録三卷唐圓照集結函宋藏遺珍文有出入大正二一五六遺珍異本貞元新定釋教目録三十卷唐圓照撰結函大正二一五七續貞元釋教録一卷南唐恆安集附進表及後記內題上有大唐保大乙巳歲七字結函大正二一五八大藏目録三卷麗藏目録結函大普寧寺大藏經目録四卷元如瑩序師正校斟元藏目録結函大明重刊三藏聖教目録一卷明雙徑山僧衆同編吳用先序朱大猷懇免賒請說朱茂時茂暻緣起即嘉興正藏目録結函高麗國新雕大藏校正別録三十卷高麗守其等編內題無高麗國三字結函音義部新集藏經音義隨函録三十卷後晉可洪撰為函續一切經音義十卷宋希麟撰并序為函大正二一二九一切經音義一百卷唐慧琳