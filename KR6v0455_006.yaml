body:
  text: 中華大藏經續藏編目説明一中華大藏經續藏專收歷代中外藏經未録之經典分類刊布二古代編藏旨在求精故相傳著述入藏須奉詔旨而考之歷代藏經殊不盡然開元釋教録所附入藏録原非奉詔編纂其後各藏互有增減亦非出於朝命宋之大慧語録奉詔入藏而僅見於閩刻二本崇寧毗盧其浙刻三本圓覺資福及磧砂端平目録則未遵行蓋奉詔云者許其入藏而非必須入藏至明清兩代始漸嚴格去取之故亦不免言人人殊如龍藏刪除之經有見於開元入藏録者至後期民間及日本刻藏則不求精而求備嘉卍兩續及縮刻大正皆然今於選藏四輯悉著各藏已録之經書并各歸原藏以見求精求備之實更於續藏一編量收各藏未著之經書以廣求精求備之意選藏排列悉本原目故不另分部門續藏冠以總目經論與疏注分部相同目録中連書部類以便省覽三各藏未收之南傳經典已譯為華洋文對照編入譯藏者茲仍著其華文部份四經疏鈔已分別入藏後人釐為會本嘉卍兩續皆重收以便閲讀茲仍前例并及經文冠科其科文已見原注非經重治或與別本科文對照者不録五古代釐經合注書前不再出白文此通例也而遠自嘉興正藏百函盂蘭盆經疏已另以白文冠首嘉續係單本集成乃至近代版刻尤所習見本擬一律刪除而周止庵心經詮注以八譯冠前且有説明若刪除之是并去其説明理所不可其餘一般白文字句不同另有説明或注內未舉全文者皆應照印餘則斟酌需要與否而為取捨六經注之前或冠以香讚啓請願文等殆兼作讀本之用此雖各經多同然相傳已久若盡刪除則無所附麗故仍其舊七末世文勝於質著作家在例有序跋外或冠以佛菩薩繪像名流題籤題字著者攝影及其他有關圖文連篇纍牘不能悉印今惟擇其出自名手及關係重要者影印餘并從略專集後之附録只著塔銘行傳等其哀挽弔祭之文非特關重要者不録八經論會譯或節要皆為發明經旨故入疏部九後代就前人著作選擇抄録另成一書者比比皆是前人著作多已見於本藏各輯若將選擇鈔録者各還本書勢必剔除淨盡今悉仍其舊惟附録已見本藏又非特著注釋解説者酌豫存目注明他如格言藥方及校印捐資回向等惟存其較為重要者以節篇幅十乩筆著作古代不以入藏然嘉卍兩續收之今準此例選擇不背佛法且流通已久者繼續刊印十一我國所譯密部諸經編入各藏者向有唐密之稱而此名稱之由來當係創自日本以別於弘法大師在東寺所傳東密慈覺大師在天台山智證大師在圓城寺所傳台密唐密經典各藏著録頗多東密台密重要部份見於大正續藏屬於日本著述不在中華大藏範圍之內未宜斟録參見本説明十五西藏密教直承印土向稱藏密元代已有入藏如拔合思巴所集出家授近圓羯磨儀範民國以來移譯尤多本藏所收率為珍本孤本特立藏密部按照上師傳承注明紅教白教新紅教黃教及教派不明者共達四百餘部之多至唐密則惟録歷代藏外遺文及後期疏解東密台密惟録向在中國庋藏不見於大正續藏者及近數十年國人學法間有著作或就日本著作注釋選譯者皆為數無多合稱諸密部以副於諸經諸律諸論之例十二藏密諸密兩部皆賅括經律論疏及修持觀想一切經書故列於經疏律疏論疏三類之後行持教觀二類之前換言之凡密典皆屬於此而其他部類並為顯教用以明界限而便研求然此中分晰亦至難言如能海大師所著普賢行願品頌解湯薌銘居士所著普賢行願品五譯合行及賢行願王釋義皆密教之言也以經文向屬顯教故仍入經疏類華嚴部超一大師所譯心經向來雖屬顯教以其與白傘蓋緑度母合為大乘無上三經若分出之則前後序跋無所附麗故入密部此皆不得不然者也十三藏密多不分卷茲故從略密藏院藏本在目録中或記頁數茲亦併記於後間或注明版本來源十四經書之一部份已見於前三輯存目或第四輯附記者皆於續編出其全部如雲棲法彙各單本見於嘉卍兩續存目金陵梵剎志內南藏目録見於南藏附記十五歷代藏經雜收韓日著作部數無多各輯斟録如例惟大正續藏除古逸疑似兩部外不在斟録之列見第四輯編目説明八今編續藏於韓國古德遺著承彼國同道寄贈數種隨類編入並於目録著明贈者德號於日本古德遺著見於大正續藏者以入日華人及入華日人并其直接法嗣之著作為限編入若干部一時難於遍考惟以禪籍為主偶及其他入日華人并改注中國朝代此外則大正續藏未收之日人著作或已收而由華人輯刻者亦擇要著録皆於目録著明版本來源十六各部門以有書可收為主雖止一種亦特立部門以待補充經律論密之後繼以教觀宗門二類教觀最後為通詮部乃會通詮釋不屬於各宗者宗門最後為雜説部則以禪宗為限一般詩文雜著入專集類會心不遠存乎其人十七禪宗語録本為專記言句衍為廣收一般著作與專集無別今於語録目録依第二三兩輯之例著明世次傳承不知者彙列於後不名語録而名集者或語録之外另有專集者入專集部亦儘所知著之已見於語録者則不復著韓日著作推算中國世次傳承其本國之世次傳承從略十八專集類分三部一為法集二為詩文集三為雜著法集之應入藏不待言矣各家詩文及雜著編入法集者自因而聯帶入藏其別行者惟見於嘉卍兩續今仿其意於出家諸師著作稍加擴充凡詩文及雜著未入法集或本無法集者縱使世諦文字亦其思想所寄視塔銘行述更為親切日本縮刻藏曾特立序讚詩歌部尤其詩境與禪境相為表裏禪得詩而彌顯詩得禪而益超是以所收較多若僅明一事一物者如普聞詩論仲仁梅譜居月琴譜贊寧筍譜之類則不闌入其在家著作仍以涉及佛法為限雖涉佛法而篇章簡短無大發明者亦不闌入十九一人著作已編專集者入專集類其未編專集而由本會搜羅略備者亦釐為專集并豫收入此祇弘一湛山丁仲祐三集未編專集或專集未收者按其性質收入各部兵革擾攘書籍不得流通或已編專集未能盡知姑存其所得一二東鱗西爪有待補充二十大正續藏古逸疑似兩部以敦煌石室後出之本為多我國中央圖書館所藏敦煌寫本尚有大正未收者茲特酌採影印其首尾並缺無從辨識經名者略之二一目録於著作序跋皆以題名為主惟書內僅著字號者間仍其舊二二前四輯根據各藏原來次序不發生版本及排列問題續藏零星集成每目儘可能注明序跋年月及版本來源其不經見之書間或著明內容大旨每部依各書性質以類相從性質相同者依著作先後排列序跋刻印紀年原著年號干支或佛曆及韓日著作署其本國年號者悉照書之惟署西曆者改為華曆至佛歷新舊不同從其原文間亦略加注明二三運遘陽九經典銷亡求借所得往往破碎殘缺勉為黏補影印間有朱墨批點題記者瑕瑜互見擇其尤佳者照印餘悉從略二四輯録經書原附有刊誤表者悉豫照改但仍照印原表以備考查二五續藏不似正藏有固定範圍多方訪求略如本目而公私藏書機構往往例不外借甚至僅見其目而不見其書既不獲從容披覽則於究明意趣檢核同異乃至隨目注説排定次序皆不得審慎從事期臻至當本擬在付印以前聚集全部經書重行彙核庶幾減少訛誤而此願又不得遂所幸祕笈珍本一律公開閲者善取擇焉可耳中華大藏經續藏總目經藏類阿含部本緣部般若部法華部論藏類毗曇部經疏類華嚴部寶積部般若部法華部涅槃部諸經部律疏類聲聞部菩薩部諸律部論疏類釋經部毗曇部中觀部瑜伽部諸論部密教類藏密部諸密部教觀類三論部天台部賢首部法相部淨土部通詮部宗門類宗論部語録部拈頌部雜説部行持類法事部軌範部導俗部史地類教史部彙傳部別傳部燈録部感應部地理部彙編類叢録部音義部專集類法集部詩文集部雜著部燉煌類古逸部疑似部中華大藏經續藏目録經藏類阿含部長部經典一十四經出巴利文南傳藏民國江百鍊據日譯本再譯三十三年芝峯校證十四經中見於長阿含者十三一無舊譯普慧藏鉛印一册長部經典二九經出巴利文南傳藏民國江百鍊據日譯本再譯三十三年芝峯校證九經中見於長阿含者八見於中阿含者一普慧藏鉛印一册中部經典一五品五十經出巴利文南傳藏民國三十三年芝峯據日譯本再譯五十經中見於中阿含者三十五見於增一阿含者十餘無舊譯普慧藏鉛印一册經藏類本緣部小部經典六本生經一出巴利文南傳藏民國三十三年夏丏尊據日譯本再譯前為因緣總序第一編第一章至第五章凡五十緣普慧藏鉛印一册小部經典七本生經二出巴利文南傳藏民國三十三年夏丏尊據日譯本再譯第六章至第十章凡一百緣普慧藏鉛印一册南傳三經三卷民國法舫成元慧等譯三經為吉祥經大悲經三寶經有三皈依等課誦讚偈佛學叢書編輯委員會序法舫三寶經譯後序民國五十一年佛學叢書與英譯本合印羯臘摩經一卷民國丘寶光徐鄂雲譯並序中阿含伽藍經同本民國五十一年佛學叢書與英譯本合印南傳法句一卷民國了參譯四十一年印順序佛曆二四九六年香港內明出版社鉛印一册東蓮覺苑流通經藏類般若部金剛能斷般若波羅蜜多經一卷清裕恩譯同治十年如皋刻經處木刻一册普遍智藏般若波羅蜜多心經一卷唐法月譯出日本石山寺藏鈔本目録不載與大正藏二五一重譯本稍異殆初譯也石山寺藏又有摩訶般若波羅蜜多心經唐般若譯鈔本目録不載與大正藏二五二般若共利言譯祗數字出入今不重出附識於此經藏類法華部妙法蓮華經佚文英國克爾思譯民國呂碧城重譯論藏類毗曇部發趣論一一卷尊者舍利弗説出巴利文南傳藏民國范寄東據日譯本再譯三十三年芝峯校證論文未竟此為順三法發趣善三法第一故標發趣論一附大發趣論注一卷日本覺音注普慧藏鉛印一册經疏類華嚴部華嚴探玄記會本一百二十卷唐法藏述民國徐文霨會編丙寅年自跋戊午年陳鏡清序偈甲寅年周暹後記木刻四十册華嚴經疏科文表解不分卷民國李圓淨就卍續八所載十卷本重治戊寅年自跋密林序黃妙悟跋丁丑年王薳緣起附録徐蔚如遺札疏鈔檢查表鉛印一册原附贈陳量書禮華嚴文不列目録今亦附印卷末華嚴經疏論纂要一百二十卷唐澄觀疏李通玄論明道霈纂康熙七年自序擇取疏論之精要隨文纂注並懸示大意六段康熙十九年謝大材序嘉慶丁卯年熊官梅補刊序有清涼棗柏傳並像贊普慧藏依清初鼓山補刻本略易行欵版心標品科間有正訛考異之處共十六册後附華嚴經略策華嚴七處九會頌釋章皆見卍續四此不重印普賢行願品五譯合行不分卷民國湯薌銘彙校壬午年自序取唐不空譯唐般若譯燉煌本佚名二譯及自譯為五譯會本北平菩提學會鉛印一册賢行願王釋義不分卷章嘉遊戲金剛造民國湯薌銘譯壬午年自序王印璋序文陸序北平菩提學會鉛印一册大方廣佛華嚴經入法界品四十二字觀門義證一卷唐不空譯民國周演濟分章集證最上雲音室法彙之五木刻一册普賢行願品頌解一卷民國能海解辛卯年自跋前有科解四十一年上海金剛道場鉛印一册普賢行願品頌疏一卷民國周演濟述最上雲音室法彙之八金陵刻經處木刻一册普賢行願品疏鈔擷一卷唐澄觀疏宗密鈔民國幻修居士擷庚申年自序附華嚴纂靈紀數則鉛印一册文