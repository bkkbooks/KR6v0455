body:
  text: 中華大藏經總目録目次中華大藏經序九首五修訂中華大藏經緣起二九修訂中華大藏經會章程三一中華大藏經四大法類修訂綱要三五修訂中華大藏經會成立大會宣言三七修訂中華大藏經會成立大會致詞三九修訂中華大藏經會籌備工作報告四一中華大藏經編目通例四五中華大藏經第一輯磧砂藏及宋藏遺珍編目説明五五附録記美國普林斯頓大學的葛思德東方書庫藏的磧砂藏經原本六一中華大藏經第一輯磧砂藏校訂目録六九重訂影印磧砂藏經補頁表略中華大藏經第一輯宋藏遺珍校訂目録一七九中華大藏經第二輯嘉興正續藏編目説明一八三中華大藏經第二輯嘉興藏校訂對照目録一八九中華大藏經第二輯嘉興續藏又續藏及藏外校訂對照目録三一中華大藏經第三輯卍字正續藏編目説明三五一中華大藏經第三輯卍字藏校訂對照目録三五七中華大藏經第三輯卍字續藏校訂對照目録四六九中華大藏經第四輯編目説明六二一中華大藏經第四輯目録六二五中華大藏經綜合補録目録六六七中華大藏經續藏編目説明六九三中華大藏經續藏總目六九九中華大藏經續藏目録七三中華大藏經譯藏編目説明七八三中華大藏經譯藏目録七八五中華大藏經總目録編目説明七八七中華大藏經總目録目録七八九刊印中華大藏經首編書後七九三中華大藏經序釋教之有大藏猶儒教之有四庫也顧四庫以漢書藝文志為濫觴代有增益雖編目而不集書至永樂大典四庫全書雖集書而不刊版是以隨收隨散今日不惟漢唐著録及永樂大典不可畢覩即四庫全書當日抄録七部兵火戰亂之餘輾轉携至臺灣者亦只一部可謂不絶如縷矣釋藏則不然六朝以後諸家經録亦如儒家之有目無書而自唐開元間編定入藏録宋開寶四年遂付剞劂以後不斷編刻傳之高麗日本亦皆仿行雖內容稍稍增減而凡所收録片言隻字無有遺墜果其版本未絶則藏庋之家承學之士皆可豫取豫求是誠法良意美者也我國歷代編印藏經或由政府主持或由信衆倡導至前清龍藏而止高麗藏經全由政府主持日本與我國同而近年所刻各藏收經特多我國清末上海頻伽精舍曾仿印其宏教書院縮刻藏政府遷臺灣後中華佛教文化館復影印其大正藏流布遐邇雖已足資探討而自民國成立以來竟未能自編藏經論者每以為憾屈文六居士外掌封圻內參樞府經濟文章久為當世推重晚年學佛既佩三密法印而以八十高齡復有修訂中華大藏經之舉緇素響應龍天擁護略變舊例為四大法類一曰正藏收歷代已入藏之經典二曰續藏收歷代未入藏之經典三曰譯藏收譯成西文之經典四曰總目録收各藏目録及有關書籍就正藏言凡收經書三千九百餘種以視四庫全書之三千四百餘種不計存目已超過之而續藏譯藏總目録尚未計入此洋洋巨帙洵與儒書華嶽並立而呈東方文化燦爛之奇觀也余於茲役忝與發起之列喜見開始出版遂書數語以辨其首中華民國五十三年佛歡喜日雙城莫德惠拜撰中華大藏經序佛教自漢明帝時傳入中國騰蘭遠蒞玄奘西遊中國文化儒也道也因圓融而益光大東傳海外代有記載佛教遂成為中日韓三國之無上文明中國藏經歷代均有修訂惟自清雍乾間修訂龍藏後二百餘年來尚未暇及此現當反共復國復興文化宏揚佛教至關重要爰由黨國元老于右任暨趙夷午屈文六諸氏呈請總統設館修訂奉批社會文化由社會人士為之大哉言乎乃於民國四十五年十一月十一日於臺北市善導寺開成立會推主修理監事報經本部備案迄今七載綱舉目張余忝綜部務樂觀厥成茲當印行開始用辨數語如右中華民國五十二年歲杪連震東識于內政部中華大藏經序佛經有藏由來久矣自梁武帝於華林園總集釋氏經典厥後歷朝之修纂梓印者相踵繼於是卷帙浩繁汗牛充棟宏揚教義嘉惠信士厥功偉矣顧自龍藏以後迄今垂二百餘年闕然而無續者其故安在豈好之者無力而有力者不肯為乎抑緇素胥漠然於斯乎殆典籍之整輯皆盛行於承平之際至若戈鋋鋒火之間救死扶傷猶恐不贍遂未遑懷鉛握槧歟民國四十五年黨國元老于右任暨趙夷午屈文六諸公倡議設館修藏是年冬修訂大藏經會於焉成立自是校勘剞劂日程其成今余觀其所訂要例除復者曰選藏增新者曰續藏移文者曰譯藏舉篇者曰總目窮源而竟委綱舉而目張可謂燦然大備矣紀曉嵐曰儒如五穀一日不食則飢數日則必死釋道如藥餌死生得失之關喜怒哀樂之感用以釋冤愆除拂鬱較儒家為最捷丁茲劫殷龍漢而於羣策中興之時圖此不朽之業用以釋冤愆除拂鬱洵濟世之良藥也其所為所見過於古人遠矣豈非盛事乎然則是書之修也竊以為有四美焉巨細畢收是曰可大開繼相期是曰可久移譯以傳是曰可遠淑世針時是曰可達宜乎士林拭目莫不樂觀其成斯誠文化之津梁禪林之府庫也已中華民國五十三年夏黃季陸謹序於教育部中華大藏經序佛法為一切智者之學稱實相之理盡法界之量備通世出世法以修身為本而達自覺覺他之極則者也粵自能仁啓教賢聖輩出法肇五天歷千五百年而晦隱化流四土竟二千餘載而方隆傳通人世今有三焉巴利文系之錫蘭三藏詳於初五百年之聲聞法化遍緬泰寮柬蕃藏文系之西藏二部詳於後五百年之祕密流風被滿蒙青康吾中華之華文系大藏特詳於中五百年之菩薩學上則聲聞三藏既衆部以兼明下則祕密經軌亦大體已斯具歷代持宏餘惠遠及越南韓日原華文之聖典譯傳起於漢元壽佛書編目著於晉道安大藏刊行始於宋開寶由中華傳韓日集録刊布代有勝業刊行藏經而可考見者達數十種佛法為究極無上之道隨機利見流衍不同而惟華文大藏足以統五天千百年聖學之全窮源竟委得以見佛乘一味之真吾中華佛子寧不引以自慶耶今也變亂日亟異説方張值文化日新之世民族貞元之會自宜整理大藏充實而發揚之平人心地以啓世大同此固識者所共知宜文六長者發起修訂中華大藏經而得朝野緇素所共贊也修訂中華大藏經廣之以四大法類內容體例屈序及綱要言之詳矣試復贅言之一歷代華文藏典多少互異存沒不同今盡舉歷代藏經去其重出綜為一部曰選藏實歷代藏經之集成也二元明以來蕃藏巴利之文或有選譯古德著述遺珍非一今採集得九百餘部編之曰續藏極續藏之量可總攝蕃藏巴利聖典之譯為華文者雖譯華非一日之功而立此大類固當續續不已期乎靡遺三華文佛典之傳布世界首賴移譯取今之已譯英文者而輯之曰譯藏據此意而引申之則自小品以至大部自英語而及餘文契時應機譯藏之業固方興而未艾四總目録集一切佛典目録以備稽考允治佛學之要事總此以論選藏似多而易成續藏譯藏始雖簡而畢也巨統四大法類以成中華大藏經雖續譯之功事有所待選藏之名人或未喻而其董理集成華文大藏之固有編續集以充益之譯外文以宏通之思之深而慮也密期心遠大非吾中華民族性之博大高明其何以能此時歷八年選藏既成印謬忝發起之列謹申序讚以志隨喜云爾中華民國五十二年六月慧日沙門印順謹序中華大藏經序佛法為包博世出世間一切究竟之學説宏通廣大玄妙精微不可思議雖有阿難尊者之結集經藏優婆離尊者之結集律藏諸大菩薩及歷代祖師之造論著疏自漢明流入中國苟非代有所修訂則諸藏無由合集散漫失統矣蓋佛教三藏巨著宏編汗牛充棟欲得全集而讀之既為時間所不許亦為精力所不及此大藏經之所以輯也間嘗讀隋書經籍志悉梁武帝於華林園中總集佛教經典凡五千四百卷沙門寶易又撰諸經目録斯為佛經有藏之始復經平生考據藏經之編纂而猶能憶及者如唐開元間沙門智升著開元釋經目録二十卷列入五千零四十八卷其後宋元明清公私鐫版者亦至夥宋有蜀版五千零四十八卷福州東禪寺版六千四百三十四卷福州開元寺版六千一百十七卷思溪版五千九百十八卷蘇州延聖院磧砂版五千八百零二卷一説為六千三百餘卷元有杭州版六千零十一卷明有南藏六千三百三十一卷北藏六千三百六十一卷清有雍正間之龍藏則依明本而重刊者乾隆間又有續藏之刊行焉入民國後有頻伽藏之纂輯則據日本弘教書院本益以龍藏續藏而成者都八千四百十六卷頻伽云者以藏為頻伽精舍主人哈同氏所主編也宋元明諸版本久多亡佚惟南京磧砂版尚存孤本原藏臥龍開元二寺缺一百七十三卷後為西安省立圖書館收藏茲者板蕩中原赤氛瀰漫皇皇巨帙恐亦無存謂非釋典之一大劫乎屈文六長者惄焉傷之爰發重修中華大藏之宏願而當代緇素咸表贊同悉力以赴乃成立修訂中華大藏經會徵集會員釐定規章延攬人才從事編訂並分是經為四大類曰選藏曰續藏曰譯藏曰總目録其大要已詳於印順法師之序矣茲不再贅從此華文聖典譯傳靡不搜羅盡有雖續藏譯藏猶有待後來者之擴充光大而於此八稔之中已將選藏完成其功實不可沒靈源自慚淺識亦得追隨於後共襄盛舉不揣冒昧謹舉所知者而約略言之以志梗概何敢言序云哉中華民國五十二年暮秋之月沙門靈源謹識中華大藏經序本師釋迦文佛於二千五百年前降生天竺十九出家三十成道説法靈鷲暨諸方歷時四十有九稔作人天師表度無數有情巍巍乎慈悲喜捨不可以言喻也及漢明帝時大法西傳騰蘭遠蒞法運遂轉移於東土大乘展轉傳於日韓聖域今所行者惟聲聞緣覺耳逮至唐太宗時玄奘法師大心肇啓西域孤征白馬東來藏經運至厥後仁王多崇象教大法日漸宏揚有唐一代實為最盛時期逮至宋元明清歷朝君主莫不紹隆三寶考大藏經譯寫遠在東漢纂輯目録始於道安編定函號肇自開元鐫版始於唐季私刻起於宋而盛行於明清初印龍藏大本莊嚴殆軼前代越二百餘年竟無嗣響及清末始有優婆夷羅迦陵氏發心刊印頻伽大藏起於宣統而成於民初其印行期中蓋不計若干艱阻也更歷四十餘稔復有屈文六長老發起印中華大藏經當吾國政府逼處於臺員片島之際既乏往者帝王國庫之財源又非羅氏富饒之境遇耆英提倡多士影從而竟得博通內典之蔡念生居士慨任總編審于七載間編成選藏三千餘部續藏九百餘部並三十二種藏經目録表解卷帙有如是繁多可謂空前之絶作觀屈序云體大思精實為法海津梁洵稱篤論衲讀之有深愧焉余童貞剃染忝列沙門宗研華嚴殊罕心得東來後蟄居茅舍講演僅接引初機對賢首全經未能開壇一述豈遑論列印大藏經文屈序於古今印藏原委博引繁稱淺學若余何堪作序感文老之雅屬難辭惟祝大經流布佛日增輝法輪常轉扭轉人心振興國運期早日收回大陸致郅治媲美漢唐使諸山名剎各得此經一部俾四衆勇猛修持庶不負屈蔡二老之殊勝功德是所願也民國五十二年歲次癸卯重陽日華嚴蓮社沙門南亭謹撰中華大藏經序昔釋迦文佛為解脫六道衆生輪回諸苦一大事因緣降生於佛曆二千五百年前現太子身於印度迦毗羅衛國年十九捨王宮入雪山修苦行六年遂成正覺説法四十九載垂示三藏十二部經典以度後世之衆生吾人窮畢生精力而莫得究竟大矣哉經教之深廣也我國自宋之開寶至清之雍正均曾刊大藏經行世時值承平以國家之財力易舉他如日泰諸邦亦曾疊出編刊互相印證玄義益明而選藏尚未聞有建議者今屈文六長老發心修訂集野老以擬昔日之朝賢募私財以代當年之庫帑綜人財兩力之懸殊等什一于千百雖聞風讚歎者多初尚慮博大艱難參加者猶不免依違審慎也然幸得蔡念生居士以天誕般若博覽群經獨任總編審徐可均居士樂善好施慨任印行委員衆擎易舉大業可計日觀成寧非三寶之特殊加被耶本際向以為藏有重出似可酌刪本多後出亟需增補區區淺見蓋有不謀而合者顧內典浩如煙海曩僅窺閲藏知津及少分經藏何敢妄參論列貽笑方家乃厚承文老諈諉以謬耄啞羊濫廁末席此固深感慶幸而內心未嘗不滋愧也東來後蒿目世風日下邪説紛乘恐禍亂之將至冀他日新藏一出而未來之劫運潛消則凡從事諸君子之豐功偉烈其可量乎惟晚近人根陋劣好簡厭繁如來憫衆生愚癡具八萬四千病故如數説法以對之伏願如來使此藏本放大神光俾讀者目一偈半偈便發明心地拔三毒根得四聖智而同成正覺五濁惡世一變而為莊嚴聖域庶十方三世諸佛齊暢本懷此愚衲所馨香禱祝以求之者謹序民國五十二年歲次癸卯觀音大士聖誕日復興海印寺沙門本際謹撰中華大藏經序世之言文化者輒區之為西方文化與東方文化而東方文化以儒釋為兩大支流此猶宥於方之內也若遊於方之外而縱觀夫所謂三世九有者則釋迦設教實兼世出世法儒教亦所含容祗以義軒以來周孔繼統世儒拘於舊習目為異端列諸方伎然於其應化無方談言微中亦不能悉豫抹煞故自六朝唐宋而後天祿琳琅之府名山宛委之藏輒立釋教一門但所收極簡雖清初文物之盛四庫全書中佛典著録祇十三部存目祇十二部而又僅收雜書不及經律私人藏書如海源閣楊氏鐵琴銅劍樓瞿氏皕宋樓陸氏八千卷樓丁氏所謂四大家者書目所列釋典尤甚幾微是皆先入為主門戶之蔽其於代表東方文化殆未能語其全也然釋氏自傳其學自守其書則又遠在儒教之前蓋自釋迦示寂約當孔子誕生之年釋迦諸大弟子已從事結集三藏以後代有增益大法東傳移譯演繹汗牛充棟至唐開元釋教録附入藏録而藏經形式以立其同時之儒書目録如隋書經籍志唐書藝文志及崇文總目尚未能如此完備况儒書祇存目而非彙刻自不免於散佚佛教則自宋開寶四年據開元入藏録雕版已由僅有其目進為實有其書以後繼續刊行今日目録可見者有宋一代為崇寧藏崇寧三年毗盧藏紹興二十年及乾道八年圓覺藏紹興二年資福藏嘉熙三年磧砂藏端平元年天寧藏金大定十三年六種原始之開寶藏及北朝之天寧藏目録雖佚仍可參考而知見開元録及宋藏遺珍單行目録附録各藏互有增減大致略同易代而後元之普寧藏及重編磧砂藏加入大批密部經典明之南北藏及清之龍藏繼續前規明嘉興正藏與北藏同特易梵策為書册以續藏為世所重海外則高麗初雕藏仿宋祖所賜開寶宋太祖時後又仿刻契丹藏宋理宗時其去取自為義例今唯再雕藏目録可見日本初刻天海藏明清之間略同資福而黃檗藏清康熙時則全仿北藏至縮刻藏清光緒時始自出機杼收經特多卍字藏以北藏之目刻麗藏之文而續藏廣收中國古逸典籍視嘉興續藏更有過之我國商務印書館曾仿印流通大正藏號稱彙合各藏惟於縮刻卍字所著録者尚未盡數録入中韓各藏更不待言蓋祇擷其精英並未盡其部帙我國中華佛教文化館曾仿印流通此中韓日三國印藏之大較也他如中國考訂藏目之書乃係提要性質日本就各寺所存經書勒成藏目仿各藏而稍有出入皆未經過刻版茲不贅述佛藏之來源既如是其悠久各國刻藏之演進又如是其繁多而我國自雍正龍藏之後二百年來未曾修藏頻伽印縮刻祇減二十七部并就目録分合略有變易普慧藏半途而止僅餘斷簡殘編在此期間日本縮刻卍字大正相繼問世以彼國之精勤促吾人之振作今日編刻大藏殆為刻不容緩之圖而鄙意猶不止此蓋自近百年來中西文化皆有顯著之改變對前一時代之徹底整理即有裨於後一時代之順序發揚我國學人於經史子集及各種學術莫不作此工作佛教何能例外居今日而言編刻藏經已非如宋元明清之斷代修書增減任意所能滿足需要應統海內海外已入藏未入藏一切佛典作成空前未有之結集庶達承先啓後之目的不負劃時代之神聖使命竊以此恉徵諸緇素大德詢謀僉同於是不揆搗昧糾集同道組織修訂中華大藏經會揭櫫四大法類一為選藏二為續藏三為譯藏四為總目録請備述之何以為選藏也自古別於續藏皆曰正藏今與古之正藏稍有不同其目的於古仿中外已入藏者不遺一部未入藏者不增一部自成果言之為正自工作言之為選謂就歷代中外三十二種藏經中一則遍選各藏去其重復二則特選某藏資以刊布由前者言之各藏遞相困革增某經減某經分某經合某經向無詳細之校勘與精確之統計本會首編三十一種藏經目録對照表解以大正所收為第一目録餘藏所收不見於大正者為第二目録每目之下注明見於何藏何函於民國四十八年出版嗣又加入金藏為三十二種最後確定為二十四種見第四輯編目説明三此項工作歷時四年有餘而後獲知歷代中外已入藏之經典為三千九百餘部此所謂遍選各藏去其重復者也由後者言之此三千九百餘部本會曾依修藏舊例重分部類編為中華大藏經目録草案與表解同時刊布并向十方大德徵求意見加以縝密研討一則部類排列衆議未能僉同二則本藏以影印為主各藏糅合版式難於劃一因決定就各藏版本最古收經最多者選為影印對象仍其部類去其重復分為四輯刊布磧砂及宋藏遺珍為第一輯全部影印嘉興正續藏為第二輯去其已見於前輯者卍字正續藏為第三輯去其已見於前二輯者其他各藏為第四輯去其已見於前三輯者三千九百餘部之經典備於四輯之內因有異本別出缺本減除及原藏重出或補前輯缺文等等共印出三千九百七十三部若不計重出及補前輯缺文則為三千九百五十一部此所謂特選某藏資以刊布者也此三千九百餘部實集中日韓三國藏經之全以完備論古無先例讀者當能察之何以為續藏也前代以續藏補正藏之闕無同時纂集之理今選中外已入藏者為選藏以集各藏之大成未入藏者為續藏以補各藏之未備界限分明自不妨同時纂集祇藏密部輯入稍多餘則零星收羅書缺有間而孤本珍籍亦頗因此獲得如五宗救遍行堂集李溫陵集諸書是也盡其可能共得九百餘部今日環境所限不過如此惟待後賢之補輯耳何以為譯藏也今日海空交通佛教之遍傳世界已為日有進步之事實藏經之須具世界性亦為切合時代之要求大乘佛法以漢文藏經為備近百年來譯為西文者已有多種惟散在各地求索不易儘可能獲得者輯為譯藏以供國人宏揚之資兼開西人探討之路雖著録無多後之人繼續移譯繼續收羅則此一部門定可蔚成大觀何以為總目録也因書籍之繁多而目録之學以興佛藏之多𪭺於四部足為目録學之所建立由來已久而歷代學者每取得魚忘筌之態度故此學迄未發達然如二十四種藏經目録對照表解最末所録五種體大思精實為法海津梁日本大正藏特別注意於此另輯昭和法寶總目録刊載大正有關目録并及一般目録惟於中國著作未能備收今略仿其意首載中華大藏經首編及索引次為基本目録及有關目録後擇載一般目録並就徵集所得附以藏印錫泰等國未譯為漢文之經籍目録及歡美各國所譯本國文之經籍目録以便研討此一科目孳乳無窮學者其留意焉右以選藏續藏為骨幹譯藏總目録為羽翼既舉歷代藏經所收之經典一無所遺更集歷代藏經未收之經典儘所能得除譯藏及總目録不計外僅選藏及續藏近五千部視原始藏經之開寶藏一千七十六部約為四倍以上視最後藏經之日本大正藏二千三百七十三部續藏只計古逸疑似則為一倍以上而視外學四庫全書之三千四百七十部不計存目約增十分之四以上讀者於以覩佛藏之全知佛教之大不但內學典籍之結集足以媲美四庫而且東方文化之宣播足以啓迪全球自民國四十五年十一月十一日開成立大會起於今十載集發起人主修總編審理事監事顧問職員等四百餘人之精力財力成此巨帙滿此微願蔡念生總編審於首編脫稿後送來校印當付徐可均劉懷園委員印行宏化在望喜述其梗概如此中華民國五十五年佛誕日臨海屈映光謹識中華大藏經序修藏未易言也自開元釋教録附入藏録開寶據以雕造繼續不絶至於今日原書全存或半存乃至僅有目録可見者宋代為閩版之崇寧毗盧浙版之圓覺資福磧砂及北朝之金藏金藏目録已佚蔣唯心作雕印始末考及簡目余復加以補充見本藏總目録宋藏遺珍單行本目録附録此外遼藏經目全佚弘法藏則據蔣唯心考為由他藏輯成非特刻全藏元代為普寧及補刻磧砂明代為南藏北藏嘉興藏嘉興正藏仿北藏祗排列及附録一種不同另有武林藏經目全佚清代唯有龍藏民國則頻伽而已更求之於國外高麗有初雕藏續藏仿契丹藏及再雕藏今惟再雕藏目録僅存其文字之不同者可求之於日本之縮刻卍字大正各藏近聞重印再雕藏並贈給我國一部惜尚未見日本初刻天海黃蘗二藏猶仿自中國各藏黃蘗與北藏全同繼之而有縮刻藏卍字藏大正藏縮刻大正增入甚多卍字正藏以北藏之目未全刻麗藏之文尤為考查麗藏之要籍續藏則收經之多頗有中國失傳之本因而重見然校以中國嘉興續藏仍有嘉續已收而卍續未收者日本又有輯藏多種編列某寺所藏古版經典雖具藏經形式並未刻版流通是與雕造各藏性質不侔説見第四輯編目説明且所載經典已見各藏故不計入而中國存目之書有大藏綱目指要録大藏聖教法寶標目至元法寶勘同總録大明釋教彙目義門閲藏知津五種所載經典頗有無從求索者故宜存備查考以上所舉有目可見者為開寶崇寧毗盧圓覺資福磧砂金藏普寧重編磧砂南藏北藏嘉興龍藏頻伽頻伽同於縮刻有減無增本應不計惟為民國以來之惟一藏經故列入麗藏天海黃蘗因與北藏全同不計縮刻卍字大正指要標目勘同義門知津凡二十四種此中互有出入甲藏所無者或為乙藏所有以一人遍覽各藏既為力所不逮而集各藏於一堂供人閲讀亦為事所難能屈文六上師發廣大心欲集合各藏經典不重一部不減一部合成一帙更加新編續藏譯藏總目録名曰中華大藏經緇素響應衆志成城而使余任編目之責余維茲事體大不敢掉以輕心乃竭四年之力先成三十一種藏經目録對照表解所謂三十一種者爾時尚未獲得金藏資料以前述二十三種益以日本輯藏八種而成出版以後復刪日本輯藏八種增入金藏定為二十四種以此排比各經典去其重復本擬仿歷代各藏分門別類彙為一編因採影印方法各藏版式不一難於排列又以部類先後議者亦多異同於是以原藏為主在二十四種中選其版本最古內容最富而又在現在環境可以獲得影印者分為四輯第一輯為磧砂藏及宋藏遺珍是為版本最古第二輯為嘉興正續藏不見於第一輯者第三輯為卍字正續藏不見於第二輯者此兩輯皆有續藏是為內容最富第四輯則彙合各藏不見於前三輯者佚者缺之以待覓補於是二十四種藏經備載無遺復於首編具載磧嘉卍三藏全目其嘉卍見於前輯者注明前輯函號各目重加校訂嘉續各本不同彙合編纂隨目説明惟第四輯不能仿照辦理若二十四種藏經皆載全目則連篇纍牘不可容納然觀於前三輯之全目於一目不遺之旨可以思過半矣綜觀各藏不但每藏經目互有出入即同一經中字句亦互有出入經目之出入彙合各藏可以彌此缺憾字句之出入其大不同者別出異本然已不無遺漏小不同者若別出異本實不勝其重復必須附以校勘始便研求日本縮刻大正兩藏皆附校刊未盡完備本藏以磧砂為主仍須重加校刊始能適用此非短期所能從事茲將各經不同之處擇其重要並易於截斷舉出者編為綜合補録以作喤引若有大心開士就二十四種中可以獲得之藏本互相校刊著明不同之字句並重加編次使成善本則於宗教之信仰學術之發揚必有裨益是所禱祝以求者也至於新編續藏以不見於各藏者為限此時此地所得無多然數年訪求亦有精槧孤本雜見其中譯藏以華文譯成西文者為限所得尤少有待增補總目録以有裨於目録之研究為限昭和法寶總目録搜集頗富今大部擷取而亦有昭和所未著者似此結集或能稍裨流通餘見通例及各輯編目説明中茲不贅云中華民國五十六年佛誕日念生居士蔡運辰法名寬運識於臺中修訂中華大藏經緣起四十五年十一月十一日於臺北善導寺開成立會通過大藏經者如來之慧命人天之眼目無明長夜之智炬生死苦海之慧航覺先覺後之法源世出世間之道本也今世何世赤氛燭天邪説肆其毒暴力助其瀾不惜盡舉人間而地獄之苟非宣流藏經之大慈大悲大願大勇會仁王之興起措心理於安康而欲挽此非常之劫豈易言哉然考佛法宏揚中土始於漢盛於唐昌明於宋其所集譯品以及名著刊版流通創自宋代之蜀版推展迄今世所稱之北傳系中與日韓計出藏版二十四種而收集之富不能不推日本大正版正編已積九千餘卷續編猶未計也若宋之磧砂版六千三百餘卷孤本猶存西安臥龍開元兩寺清之龍藏七千餘卷版片猶存北平柏林寺以其興修自我有繫國家民族文化之名位應益知所珍貴但龍藏而後已閲二百六十七年況世變日新文明日蔽即懍天傾地崩之懼宜圖崇德辨惑之功則興修大藏為不容緩矣夫新藏內涵自須廣攝時空益當戒慎因創擬編四大法類一曰選藏二曰續藏三曰譯藏四曰總目録懸此範疇以為集廣張本果也人天共鑒友聲大作或宣照才識學之史規或責成大方廣之創制衆寶所歸鑑諸虛谷調協異同蘄止至善締造時代之天祿石渠攜納民族於慈航樂土此物此志敢不慎勉肇役於中國中興基地之臺灣崇名為中華大藏經期以十二年成功惟茲事體大心由我發願求衆成經組會荷擔一切次第策進所望中外緇素大德同發信心恢張寶典破邪救世時不我與無量功德願共圖之修訂中華大藏經會章程內政部臺內民字第一一一八一號通知準修正案第一章總則第一條本會定名為修訂中華大藏經會第二條本會以闡揚佛乘理論矯正唯物風尚導科哲學於建設人羣真美善之理想生活使世界永獲和平康樂為宗旨第三條本會設於中華民國中央政府所在地第四條本會為搜集資料籌募經費暨流通本藏經得在海內外設立分會或辦事處第二章任務第五條本會修訂中華大藏經任務為左列四大法類一選藏二續藏三譯藏四總目録前項法類之序列與名稱必要時得加以修正第六條全藏之修訂期以十二年完成其分年進度另定之第三章會員第七條本會發起人為基本會員凡贊同本會宗旨者無分緇素經會員二人之介紹得為本會會員第八條本會會員權利如左一發言權及表決權二選舉權及被選舉權第九條本會會員義務如左一遵守本會章程及議決案二擔任本會商請協辦之事項第四章組織第十條本會設主修九人至十五人由會員大會推舉總持全會事宜第十一條本會設理事一百十七人由會員大會選舉或主修推選組織理事會並由理事互推或主修於理事中推選十一人至二十一人為常務理事組織常務理事會首席常務理事一人由常務理事互推之第十二條本會設監事九人至十五人由會員大會選舉或主修推選組織監事會並由監事互推或主修於監事中選推一人至三人為常務監事有監察會務及稽核帳目之責第十三條本會理監事任期均為二年連選得連任第十四條理事會設總幹事一人副總幹事二人幹事若干人由主修遴聘第十五條理事會設總務文書財務資料四組各設組長一人副組長二人組員若干人由常務理事會遴聘分別辦理本會事務第十六條本會設編審部主持全藏編審事宜由主修延聘總編審七人至九人編審若干人編纂若干人編譯若干人祕書主任一人祕書若干人組織之第十七條為推進會務認有必要時經主修或常務理事會決議得設置各種委員會第十八條本會設顧問若干人由主修延聘第五章會議第十九條會員大會每二年召開一次必要時得召開臨時會議均由主修召集並任主席第二十條主修會議無定期於必要時召集之第草一條理事會監事會每半年召開一次分別由首席常務理事常務監事召集並任主席常務理事會每月召開一次由首席常務理事召集並任主席必要時得開臨時會上列各項會議於必要時主修均得出席指導第草二條編審會議由總編審主持有關部門經總編審邀請得參加之第草三條常務理事會監事會編審部及各委員會之負責人聯席會議每年開會一次由主修召集之第六章經費第草四條本會經費由善信捐募政府補助第草五條本會所有經費收支一律依照會計法規辦理第草六條本會經費收支情形每半年刊布徵信録一次全藏完成後彙總刊布徵信録第七章附則第草七條本會各項規程章則均另訂之第草八條中華大藏經修訂竣事後編輯功德記公告之第草九條本章程呈報內政部備案如有未盡事宜得隨時修正補報中華大藏經四大法類修訂綱要四十七年二月草五日聯席會議通過刊登海潮音第四十卷五月號一選藏凡中韓日歷代漢文藏經中之不同者照原文盡量編入即某部世有稱為偽經或某部某處文字有錯誤者亦不更改拼棄俾後人閲此等於閲中韓日之一切藏經現已編成三十一種藏經目録對照表解據以取材編訂選藏目録提交本會審定目録編成取自何藏者依照原藏景印其不宜景印者以排印補之用何種紙幾開線裝精裝須各分多少册印一千部約費若干俟選材集成再行計議就三十一種藏經選録述要以便學人修持現已選畢般若部大寶積經四阿含及本緣上如何景印或排印俟選成後再行計議二續藏凡三十一種藏經均未收入者盡量收入之續藏部類不及選藏之多斟酌情形另分部類編纂之三譯藏凡已由漢文經籍譯成外文者盡量收入現已集有心經阿彌陀經六祖壇經等數部四總目録印藏泰錫各藏經目録盡量收編已由周祥光先生為請印度西藏佛學教授兼通中梵巴藏文者為之凡漢文經籍未收入以上選續二部者其目録均編入之以上續藏譯藏總目録景印或排印俟編成再行計議修訂中華大藏經會成立大會宣言漢興以還吾國學術思想輒為儒道二家所統攝儒家思想重在世法道家思想主在出世重世法故人類倫理賴以建立國家與社會間始有一定秩序之可循人群乃得相安於無事由出世故一般睿智曠達之士亦得遂其淡泊自守之生涯使人類精神日事向上不致墮入欲海深淵無法自拔故自整個人類社會之生活言二者相需為用其效始彰一有偏廢將成兩失所惜儒道二家未悟此旨互相排抵古昔已然自白馬馱經佛法東漸依二諦以立言融儒道於一器其影響所及在儒則有宋學之復興在道則有南宗之勃盛要皆挹佛氏之義蘊以闡發其奧旨此則群籍具存斑斑可考者也是故佛法之在吾國不僅已與固有之文化合流且復成為一般社會生活上不可須臾或離之動力吾人如欲恢復固有文化道德建立精神生活堡壘不為唯物思想毒素所侵蝕舍教義圓融之佛法外別無他道此同人所以不揣微薄有修訂大藏經會之發起也嘗考歷代撥亂反正之初皆有修輯藏經之舉唐貞觀之盛無論已宋明大一統之時其最著者也勝清開國亦嘗有龍藏之刊布自是以後二百餘年間輒成絶響有心人於此可以覘世運降替之由矣拯陷溺之人心納庶物於正軌狂瀾互挽匹夫奚辭邦人君子盍興乎來修訂中華大藏經會成立大會致詞佛法僧稱三寶為衆生所歸依處而以法為宗本蓋無法衆生即不知有佛而僧亦無由建立釋迦牟尼佛四十九年説法或開示人生之實義或策發真性之修證或廣明開遮軌範三業或備窮性相宗趣一實雖法門無量而無不契人之機合法之理以覺世牖民導歸至真至善之聖域佛滅度後集經者類集為經律論三藏或以説聲聞所行為聲聞藏説菩薩所行為菩薩藏一代聖教無越於此佛法自漢世傳入中國代有傳譯姚秦鳩摩羅什唐玄奘為譯經泰斗然羅什雖説貫羣籍而來華譯出衆經僅百八十餘卷玄奘於貞觀三年赴印至十九年回國以所獲梵本六百五十七部獻於朝奉命譯經僅出七十五部一千三百三十五卷楞伽為達摩手授二祖以為心印者明德清於五臺遇于闐國梵師言此經有四十卷則此間譯本僅十分之一此可知釋尊一代時教其佚而未傳或傳而未備者實不可計量此本會所應繼述者一佛法有南傳北傳之分學者間有諍論實非釋尊説法本旨此本會所應負責融通者二現在魔氛彌漫大地衆生均在煩惱中浮沉苦惱中掙扎並日以熾盛非救苦救難大慈大悲之佛法何以濟之此本會所應發心宏揚者三準此三義應不以時間性區域性為範圍人盡形壽事盡未來為法為人精進不已本會發起以來遍徵各方大德意見今彙寶貴之答覆擬一先以十二年集合中韓日漢文藏經去同取精並於中韓日漢文藏經遺漏未收入者如元譯之大乘要道清譯之大威德儀軌及歷代大德著述並譯藏及總目録成為中華大藏經二以此十二年所捐集經籍並徵集印度及東南亞與歐美各國經籍成立中華佛教圖書館三以此次所捐募基金及印行藏經流通餘款為本會及圖書館基金本會會務永遠進行圖書與時並增上宏下化以至器世間均成越量寶殿情世間均成無上佛道衆生有盡此願無窮敬祝同仁福壽無量同發大心圓此功德修訂中華大藏經會籌備工作報告甲修藏發起四十三年十月屈映光居士於桃園齋明寺擇靜自修因閲磧砂藏而發願興修藏經旋由章嘉大師及趙恆惕許世英于右任閻錫山賈景德吳忠信張默君李子寬朱鏡宙鍾伯毅諸位響應曾備册簽名嗣經慎重通函徵求已承親署發起簽名見覆者緇素大德如甘珠爾印順智光南亭太滄白聖道安樂觀東初默如演培月溪覺光惠光林錦東江張仁吳經明李炳南蔡運辰鄧翔海韓同方倫等物望高孚如莫德惠王雲五謝冠生王德漙嚴家淦黃國書馬壽華黃少谷林熊祥張厲生漙心畬錢永銘陳成遊彌堅楊管北束雲章等文教權威如朱家驊張其昀陳含光張君勵林尹周邦道但衡今盛成黃麟書孔德成巴壺天李世傑楊家駱劉百閔陳志臯彭慶修等外交盛譽如杭立武王東原鄭彥棻等僑領賢明如雲竹亭張蘭臣陳靜濤吳昆生金振玉李世華劉鋭之陳樹桓等至十月三十一日計收到題名發起者共二百一十人照會章第六條規定一律為本會會員乙修藏組會為適應民主