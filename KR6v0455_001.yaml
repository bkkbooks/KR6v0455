異本函號三本互異者後二目亦注異本函號同在一函為古藏所并録如磧竟函五無反復經二部或新編附入者如嘉續七八函雪關禪師語録二部不注又第四輯道宣律師感通録與律相感通傳大正並出不列別本而縮刻露函卍續甲十套則各出其一今按異本標注五卍續目録在正目之外有副目除存目無經外録入文字者可分三類一為本藏未收之書而祗著序跋附録者二為本藏已收之書而補著序跋附録者三為本藏已收之書而補著缺文者今重行釐訂卍續新目於前二類加標附存二字於後一類加標後目二字見第三輯編目説明十一并於新編全目略師其意凡正目已見前輯者如在後輯增出佚文梵字序跋題記等隨目標為補録帝王通序與止記音釋回向校勘寫閲等題記及在正文內難於割截之文字從略例如磧砂河淡函出光讚經十卷實即卍字第五套光讚經之前八卷今於卍五補後二卷是即已收之書補其缺文又如磧砂鱗函已出道行般若經嘉興淡函增出晉道安序今於嘉淡補安公序是即已收之書補其序跋附録惟未收之書祗著序跋附録者不適於本藏之例但於卍續所已收者仍豫保存以符彙合各藏之旨又經文呪文出入較多者以大正校合所著為限亦豫補録大正正文為麗本故多録宋元明三本本藏以磧砂為主略同三本故多録麗本補録不計入全藏編號及印行編號以補録二字代替印行編號每一經書可能由數藏補録正目注某藏某函補録補目上端欄外標補録二字目下注明譯著人名及補録何文行末標某藏某函以示正目所在正目屬異本者亦豫標明惟補録文前標題只注所補之本以免混淆他藏另有補録者隨補目注明補録既多若如卍續以附存與後目攙入全部正文印出似嫌間雜今稍為變通將補録之文彙印選藏四輯之後標為中華大藏經綜合補録惟卍續之附存與後目未見前輯者於目録印行編號處加書補録二字仍隨第三輯印行不入綜合補録例如續七三套正目續八七套後目之百論疏前輯所無既照印正目亦補後目已見前輯者目録行末標明見於何藏何函存目不印例如乙二十套附存佛祖宗派世譜但載與禪燈世譜不同者而佛祖宗派世譜已見嘉續四八函不需補録六藏經之有缺本惟嘉興正續及存目之書為然嘉興惟函番字藥師琉璃光七佛功德經原目録注藏本缺而莫函出生勝幢妙臂三經同卷亦注缺字中央圖書館藏本三經不缺續藏甲乙丙丁四目録增出之經尤多難覓至於實際藏本我國中央圖書館所藏散失既多日本駒澤大學所藏仍有缺佚彙合諸本重訂新目缺本自不待言此外指要標目至元義門知津等原為存目之書時隔數百年更難按圖索驥茲於嘉藏以我國藏本為主缺者以駒本或單行本補印無本可補而見於卍續者行末標卍續函號於第三輯出之不見於卍續者標明缺本存目各書亦以單行本配補編號印行無可配補者因其本為存目不標缺本七各藏缺文儘可能由後輯補録惟宋藏遺珍缺文二十九部原影印時已補七部其十二部無從覓補另十部可補未補此十部中頗有與後輯卷數參差者例如法苑義林六卷卍續甲二套為十四卷瑜伽師地論記二十卷卍續七五七六套為四十八卷更細按之文字亦間有出入無法截補原影印未豫補足亦或由此今於可補未補之十部除大唐正元續開元釋教録以異本性質在縮藏另出全文外其餘九部注明另見卍續某套并於卍續另出全文行末標遺珍缺文卍續乙二三套大通方廣滅罪莊嚴成佛經僅存卷上日本中野達慧有跋於大正二八七一另出全文亦同此皆編號計入部數補録非另出全文不編號不計部數正目注某藏某函補録補目行末標正目函號不注缺文見第五項八各藏有重出自開元入藏録已然古德由律部録出戒本固有特殊作用他如大般若經第九會奘譯金剛經大寶積經第四十六會曼陀羅仙譯文殊師利所説摩訶般若波羅密經皆重見於般若部佛頂最勝陀羅尼經附録三呪重出為呪三首經瑜伽師地論第六十一卷重出為王法正理論此皆別行單本便於講説持誦各藏相衍已久今皆編號照印目録不加標注磧砂於此局部重出外更增輦武函尹密函尹寧函衡密函各重出一部戶實函重出二部宋藏遺珍與磧砂重出一部皆全部重出宋藏遺珍本編重出二部一全部一局部綜第一輯合磧砂遺珍全部重出八部局部重出一部今為重視古版編號照印隨目注明第二輯嘉興正續第三輯卍字正續重出諸經亦隨目注明例不重印惟卍續第三套深沙大將儀軌與本套阿迦陀密一印千類千轉三使者成就經法全部重出標名與來源互異又第一套須磨提經係大寶積經之妙慧童女會局部重出源本麗藏而麗藏則因失去什譯重出此以當之祗有數字之差縮刻頻伽並同日本緣山三大藏目録解説疑為開元十四之有譯無本似未必然又第二套日光菩薩月光菩薩陀羅尼係千手千眼大悲心陀羅尼局部重出有日本淨嚴題記今皆編號照印隨目注明以資考證綜第三輯印全部重出一部局部重出二部第四輯各藏補遺不印重出九合本與單本同見一藏即局部重出或分見各藏者包括新編續藏若合本不缺不印單本如心經要論心經直談出紫柏老人集嘉續五二函印老人集則同藏三三函不印要論及直談金剛正眼楞嚴擊節出千松筆記嘉續五七函印千松則卍續二二套不印擊節三九套不印正眼雲棲法彙各單本分見各藏續藏印法彙則各藏不印單本凡不印各目皆隨目注明并於行末標某藏印行單本見於前輯者并標前輯函號但第四輯係補遺性質不論合本單本先儘前三輯印行如卍續三五套印三彌勒經疏單本則大正不印合本又嘉續三九套出相宗八要八要中之因明百法唯識緣論及論釋五種已見磧砂忠命臨各函六離合釋法式附於嘉敦函八識規矩頌補注後餘二無單本磧砂全藏印行不得減除而八要又為有義意之彙集存之有裨研求因并出之十足本與節本亦即廣本與略本或僅編排不同文有增減者同見一藏或分見各藏皆各自影印例如華嚴經疏及大般若經於嘉續十三十四函及卍續三七套另出綱要淨土十要於嘉興正續各函及閲藏知津另出數種足本而卍續甲十三套之十要合訂則係節本此皆節本由足本略出者又如嘉續五三五四函出憨山大師全集四十卷五五函又出五卷本嘉素函斷際禪師傳心法要嘉續六二六三函趙州雲門雲庵各語録皆見於嘉魚函古尊宿語録中是皆編排不同文字增減者以上并通於第四項異本之例但足本節本易於查知未盡注出餘本同見一藏者或以合本之一為異本者祗略加注明行末不標異本十一原本與注本會本同見一藏或分見各藏者在前三輯各自影印如嘉黍函印禪林寶訓續二四函及卍續甲十八套又印各注本磧拱至臣函印華嚴經嘉用至感函印華嚴經疏沙至禹函印隨疏演義鈔稷稅熟函印疏序演義鈔續一至八函印會本大鈔第四輯補遺性質原本已見前輯者仍印注本如人本欲生經已見磧砂澄函仍印大正一六九三注本若會本注本已見前輯不再印注本原本如四分律含注戒本疏行宗記見卍續六二套包括含注戒本疏毗盧旦至營函不再印戒本疏淨心戒觀法發真鈔見卍續甲十套包括淨心戒觀法大正一八九三不再印淨心戒觀法十二卍字有眉注縮刻大正皆有校刊凡著録或補録者除印刷技術困難外皆豫照印惟大正校刊號碼以每頁為起訖當豫改計或變更其標示方法十三前輯所出經書後輯標題不同繁簡分合互異者前三輯全目對照自可察知標題出入較多內容繁簡分合者間亦有之如嘉説感武函大慧禪師語録卍三一套分為四目擇要隨目注明卍續副目所列別本存目彙附卍續目録之後見第三輯編目説明十一第四輯除內容大異另出全文外餘亦附記各藏目録之後以便查考一望而知者不記如各經書單本合本原本注本不改原名者自不待記十四校訂各輯目録經名原則從內題并從首題原目録有與內題不同者或改從尾題者又尾題或與首題不同者擇要注明一望而知者不注各經正文標題下原注出某經或一名某經等字擇要注於目録用引號標明由卍續目録照録或新增者不用引號原目録所載卷數朝代譯著人名及失譯佚名有不備者酌加補充卷帙缺失而知其原為幾卷者仍標原卷數下注存某卷或缺某卷不知原卷數者只標現存某卷每目於譯著人名外增注某人序跋及重要附録序跋首為作者自序自跋次依原刻次序亦或因朝代先後及敘述便利稍有變更佚名者儘可能參照各藏補書附録以在尾題後者為準其見於尾題前者間亦注明磧嘉兩藏多有功德題記避繁不注餘藏亦或注及事屬創舉難免脫誤願讀者為是正之十五禪宗語録向來不書禪師名諱只書嗣法門人侍者小師某某輯録殆以標題已書某禪師語録故作者只書輯録人名然歷時既久標題所謂某禪師者若僅為寺名別號而録內又無行狀塔銘等文字甚至行狀塔銘亦不記名諱則名諱亦或亡失否則亦費檢尋各藏目録以嘉卍兩續語録較多大正正續次之嘉續原目駒目只列書名原目字數較略駒目稍詳原目又續藏依書內稱謂注輯録人名中央圖書館善本書目於嘉續各目改依首題標寫下注某代某師撰某師編但非每目皆然卍續則於標題中加入名諱下注某師輯録仍書稱謂而無朝代大正標題不盡書名諱下注朝代及某師輯録續藏朝代皆書日本下增禪師名諱今斟酌各例標題多依原本不論有無禪師名諱皆注朝代及某師説某師輯録略去稱謂不知禪師名諱者空格待補僅知下一字者上空一格如卍續甲二六套西山亮禪師語録亦仍其舊輯録人與禪師不同朝代者分別注明有多人者只著一二加等字下著何人序跋及有行狀塔銘等以便考索以上標寫方式期與各目一律卍續於語録各目注明世次傳承今多照録並略有補正此外各輯目録涉及禪宗者儘可能仿照補注已注明見前輯或已見前目者後則從略大抵依五燈全書亦參考其他燈録此為前代藏目所無肇始卍續頗有助於閲讀觀念但逐目參稽一時未能備書若讀者隨時補注庶可漸臻完備耳十六經書目録之譯著序跋人名依大正例以直書法諱為主大正疑似部目録不書譯著人名以示存疑今祗補書各經書內已著明者不書失譯佚名於卍續八七套第四五兩册亦同原題尊稱別號而法諱不為人所習知者間亦照題續藏尤多此例十七選藏第一輯磧砂藏及宋藏遺珍共印出一千五百八十一部內有全部重出八部局部重出一部見第八項第二輯嘉興正續藏共印出六百五十五部第三輯卍字正續藏共印出一千三百三十七部內有全部重出一部局部重出二部見第八項補遺珍缺文九部見第七項第四輯各藏補遺共印出四百部內有補卍續缺文一部見第七項總計四輯包括異本共印出三千九百七十三部除重出及補前輯缺文二十二部實三千九百五十一部見各輯編目説明末項十八磧砂各函分目詳載品題茲略加校訂冠於新輯各册之首餘藏分目及品題或有或無茲於新輯各册另冠分目酌著品題以上選藏十九續藏搜集二十四種藏經以外之典籍另分部類編纂之二十各經書之會譯及合本悉本前人舊例編入如嘉興已出楞伽各譯續藏又出會譯已出華嚴疏鈔分行續藏又出合本以上續藏草一譯藏以由漢文譯成各國文字之經書為限另分部類編纂之草二譯藏經書漢文與各國文字對照刊印以上譯藏草三本藏序文通例各輯編目説明及目録并有關文字彙為首編編入總目録中草四總目録除刊載首編外並擇載歷代中外足資參考之藏經目録及有關著述以上總目録草五昭和法寶總目録於各藏目録逐部編號至便檢察本藏四大法類目録皆仿照編列其原經昭和總目編號者亦重行校訂期無一誤
