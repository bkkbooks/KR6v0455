body:
  text: 中華大藏經第一輯磧砂藏及宋藏遺珍編目説明一中華大藏經第一輯影印磧砂藏及宋藏遺珍二磧砂乃宋平江府陳湖中小洲宋孝宗乾道八年僧寂堂築庵曰延聖院理宗時始設經坊印造梵策本藏經端平元年刊布全藏目録日本昭和法寶總目録十二元代重行改編稍有增減民國二十年朱慶瀾在陝西開元臥龍二寺發現全藏發起影印惟經卷既有殘缺而又失去目録因就各經所刻函號輯成新目録並由宋元明各藏配補缺頁同時在山西趙城縣廣勝寺發現金藏係卷子本版式不同不能配補抵擇取不見於磧砂者影印為宋藏遺珍另編磧砂藏卷首二册宋藏遺珍敘目一册包括新編目録及敘述影印經過其計劃之周詳工作之精審至足歎異此影印磧砂及宋藏遺珍為今日臺灣僅見之宋版影印藏經合印為中華大藏經第一輯三磧砂原影印每函一册冠以宋版圖像全藏共圖像八幀循環刊印今合多册為一册以八幀圖像印於前後扉頁宋藏遺珍圖像亦皆照印四磧砂原印本各經缺頁由宋元明各藏配補在卷首刊補頁表注明某册某頁今重印册數頁數皆有改變爰根據原補頁表另行編製刊於校訂目録之後其原補頁表仍隨原編卷首影印以便對照惟此表似不免訛誤例如表列四五二册下注一至一八補自永樂次行下注一九至二六上補自普寧是即大唐內典録卷一卷二鼓一鼓二祇二五下至二六上即最後二單頁補自普寧其一至二五上皆補自永樂前行所注一八當為二五上之誤次行所注一九當為二五下之誤又五三六册下注二六下至五五上補自永樂應該括二六下至三之大乘密嚴經卷下後半衡三三一至三九之七俱胝佛母所説準提陀羅尼衡四四至四六上之大樂金剛理趣釋卷上衡五以上皆非補自永樂四六上有磧砂題記尤為顯證且所注經名僅為大樂金剛誤作大乘金剛今改正所注二六下當為四六下之誤以上因永樂版空白處有雕花極易辨識披檢所及姑舉二例若彙集各藏全部覆核其事至為繁重仍照原表付印雖偶有訛誤仍不失其校勘價值也五磧砂原影印本例言云此次總目録乃新編之影印目録以訪得之經卷為根據與端平目録不同實可表示信確又云尚有經名失考暫無從訪補者十一卷即寧字函之第三第四第九第十更字函之第一第二第三橫字函之第七第八何字函之第八第九何七為彰所知論下卷影印本本册目録誤以分屬何八何九非是近年胡適之博士由美國普林斯頓大學葛思德東方書庫獲得磧砂攝影七卷為寧三寧四更一更二更三橫七橫八曾著專文考證謂此攝影恰得補足原影印本所缺十一卷中之七卷原文附後今按胡氏所得更二更三兩卷為顯密圓通成佛心要集已見原影印本功函寧三為金剛頂觀自在王如來修行法係鈔本橫七橫八為地藏菩薩本願經就中橫七係鈔本依原影印本之例缺失何經應由他藏配補不取鈔本今在臺灣無從覓得可資配補之梵策本藏經唯以胡氏所得寧四之略述金剛頂瑜伽分別聖位修證法門及更一之瑜伽集要救阿難陀羅尼熖口儀軌經隨函影印凡增二部其更二更三之顯密圓通成佛心要集寧三之金剛頂觀自在王修行法橫七橫八之地藏菩薩本願經皆不增入寧橫兩函之經於後輯出其正式刻本至於顯密圓通成佛心要集何以在原影印本為功二功三在美國本為更二更三其事甚難索解按原影印本補頁表此經係由普寧永樂兩藏配補在永樂為封函普寧祕密經武至遵函另有目録見普寧目録更函恰在其內則以更函為近原影印時若無舊目何以知功函有此經更何以知本藏有此經又寧更橫何四函十一卷經名失考當係據後卷版刻而知有前卷惟寧十二是寧字末卷補自永樂普寧若無舊目何以知本藏有此卷更何以知與永樂普寧相同推之全藏餘例應多例言雖謂此總目録以訪得經卷為根據亦或另有舊目未訪得者未曾列入而例言又謂十一卷經名失考或者舊目已糢糊不清耶若此推斷不誤此舊目未曾隨藏刊布一何可惜或謂磧砂與普寧函號多同功字與更字讀音相近然磧砂與普寧並非全同補頁既用正本亦不應以音近致誤意者兩磧砂有根本不同之處胡氏又謂影印本寧十一寧十二即美國本之寧九寧十其寧十二是依普寧所排換言之寧函只有十卷原影印本誤將寧九寧十排為寧十一寧十二遂以寧九寧十為缺本今按原影印本寧十二雖取自永樂普寧寧十一則著於原版胡氏謂原版亦有配補寧十一可能也是普寧函號似出臆測見近代學人手迹所載胡氏與芮逸夫書此寧十一如非配補則兩本有根本不同之處更可證明若以全藏逐部對勘必有更多發現胡氏僅以原影印本缺失之十一卷為考證對象所得已少至兩本同為磧砂何以內容不同蓋自端平目録之後曾經抽換改編究竟孰為原刻孰為補刻尤其宋刻各藏板式函號大抵相同美國所藏或為另一不見著録之藏經而非磧砂更係值得研究之問題此則不能不有待於後賢者矣六磧砂正本每一經名之下例注譯著人名其失譯或佚名者亦皆注明偶有不注似表明附於前目只有一目失注今試列舉而申説之身函相續解脫如來所作隨順處了義經次相續解脫地波羅蜜了義經之後開元録及宋元各藏皆無此目當係附於前目惟自北藏後已立專目虛函略明般若末後一頌讚述次能斷金剛般若波羅蜜多經論釋之後此係東土著作在論部應為附録開元録不載此目當係附於前目今所見各藏多立專目惟卍字為附録麗藏準卍字可知大正編入論疏部自以專目為是餘藏未然安函持錫杖法次得道梯磴錫杖經之後磧砂本卷首標四經同卷此不在四經之內自係附於前目各藏亦多作附録惟普寧及南藏立為專目尹函一字頂輪王念誦儀軌在前目一字奇特佛頂經尾題之前自係附録此軌與寧函所載同本異譯大正合編為九五四目他藏惟縮刻閏函及頻伽仿縮刻專目橫函苾芻習學略法次出家授近圓羯磨儀範之後北藏嘉興龍藏皆附前目卍字已標附出但仍另立一目何函大白傘蓋佛母總讚歎禱祝偈次大白傘蓋總持陀羅尼之後各藏皆附前目以上六部磧砂皆不著譯著人名當係表明其為前目附録原影印本所編目録皆立專目似失編藏本意惟除何函一部外各藏已見專目今校訂目録為減少紛更姑仍其舊並加寫譯著人名附以説明以便考索另有一目性質似非附録即寧函金剛頂瑜伽文殊師利菩薩儀軌供養法與前目無關漏注譯人原影印目録雖立專目亦未補入今於目録增注七原影印於各經排列次序係依原版函號順序惟有甚不合理者如瑟吹二函以大周刊定衆經目録卷一至卷五為瑟一至瑟五續大唐內典録為瑟六續古今譯經圖紀為瑟七古今譯經圖紀卷一至卷四為瑟八至瑟十一復以大周刊定衆經目録卷六至十四及偽經目録為吹一至吹十又戶封二函大方廣菩薩藏文殊師利根本儀軌經二十卷每函各編十卷而於戶函之末隔以無能勝大明陀羅尼經及無能勝大明心陀羅尼經二部皆有未當更按開元録瑟吹兩函續大唐內典録繼鼓函大唐內典録為第一古今譯經圖紀為第二續古今譯經圖紀為第三大周刊定衆經目録及偽經目録為第四及五崇寧毗盧兩藏皆同至圓覺而訛誤資福普寧及磧砂端平目録乃至本藏相衍未改又崇寧藏以兩無能勝經編於戶函之首至毗盧移於戶函之末圓覺資福普寧及磧砂端平目録乃至本藏相衍未改惟本藏實函已載此二經戶函係思溪配補或者原刻經時因其在文殊根本儀軌經之間而移於實函原影印時又據各藏而由思溪配補遂成重出綜計以上所舉古今譯經圖紀先續後正各為一部不便於閲覽者猶小大周録及文殊根本儀軌經皆以一部而分編二處不便於閲覽者實大今為移印雖與原版函號順序不合不暇計也其餘各經後先倒置如譯經圖紀者不一而足如盡函大乘五蘊論在廣五蘊論之後疑函古今佛道論衡在續論衡之後皆與開元不合不見於開元者如茂函圓集要義論在釋論之後亦同此誤遍考原委轉近繁瑣姑仍其舊八宋藏遺珍分三集十二函上集為第一至第四函中集為第五至第十函下集為第十一至第十二函上集首列敘目已備各集目録第二三集復首列本集目録又別印單行本敘目行世單行本序文與載於上集者稍有出入今另編校訂目録與磧砂藏銜接影印原有經前敘目及單行本敘目則收入總目録中九宋藏遺珍四十七部據葉公綽及範成法師序文皆云四十六部其第十目大唐正元新譯十地等經記即第六目十力經序文異版重出第四十四目四十五目觀彌勒菩薩上生兜率陀天經疏亦係異版重出未知減計何目惟此遺珍號稱磧砂所無而仁王般若陀羅尼釋見於磧砂實函除去兩部重出并減此目其為磧砂所無者祗四十四部今仍影印四十七部以存原本面目十宋藏遺珍不計重出凡四十四部文字缺佚者二十八部就中第二函佛説清淨毗奈耶最上大乘經三卷存二卷兩目録皆失注大唐正元續開元釋教録下卷首缺一頁兩目録於缺失不足一卷者例不標注今皆計入此二十八部中原影印本已補缺文者七部無可補輯者十一部所餘十部見於第三輯及第四輯卷數或不盡同文字間有出入輯補既難故重出之茲著卍續套數縮刻函號如下第二函大唐正元續開元釋教録三卷另見縮刻結函第五函成唯識論述記十卷存七卷另見卍續七七第六函法苑義林六卷存二卷另見卍續甲二第六函因明入正理論疏三卷存二卷另見卍續八六第六函般若波羅蜜多心經幽贊二卷存一卷另見卍續四一第六函阿彌陀經通贊疏二卷存一卷另見卍續三三第六函妙法蓮華經玄贊十卷存三卷另見卍續五二第七函瑜伽師地論略纂疏十六卷存十一卷另見卍續七五第九函瑜伽師地論記二十卷存十三卷另見卍續七五及七六第十二函觀彌勒上生兜率天經疏二卷存一卷另見卍續三五另目異版分卷不同單行目録上誤作下右舉續開元録缺下卷首頁揆其餘存數字似為序文縮刻大正兩藏皆無此序雖已無可補輯而餘文亦有不同故按異本出之又第五函成唯識論掌中樞要卷下第一行缺四字今於校訂目録注明不計入二十八部之內十一昭和法寶總目録所載磧砂目録係南宋端平年所刻未經元代改編之目録原影印本列為附録其編號今不適用茲另據原影印目録與宋藏遺珍目録分別校訂編號磧砂原影印一千五百三十二部依海外本增二部為一千五百三十四部宋藏遺珍四十七部包括異本共影印一千五百八十一部內有全部重出八部局部重出一部見通例八附録記美國普林斯敦大學的葛思德東方書庫藏的磧砂藏經原本原刊大陸雜志第十九卷第十期胡適民國二十年一九三一朱慶瀾將軍為了賑災的事到陝西在西安的開元寺臥龍寺發現南宋後期到元朝中葉繼續刻成的平江府蘇州陳湖磧砂延聖院大藏經五百九十一帙函從千字文的天字到煩字略有殘闕朱慶瀾先生回到上海就和葉恭綽蔣維喬範成和尚諸先生發起影印這部宋元刻的磧砂藏經的大工作那時候東三省已全被日本占據了整個國家已在很危險的狀態之中所以幾個大出版公司都不敢接受這一件很不容易的編校影印的大工作後來他們幾位熱心的發起人只能組織一個影印宋版藏經委員會一切編校借補照相影印的困難工作都歸這個委員會主持辦理在四年之中二十年十月到二十四年十二月一九三一年到一九三五年他位居然把這件大工作完成了編校全藏向各地公私藏書借補闕卷或闕葉編成新目録兩册影印全部磧砂大藏縮印原一帙函為一册共計五百九十一册連新目録共計五百九十三册總共印了五百部這件很偉大的工作在全國震動不安的幾年之中辦成在全面抗戰爆發的前一年半完成真是值得讚歎的值得永遠紀念的影印磧砂大藏委員會的最難得的工作是點查全藏的缺卷缺葉向各方去徵訪借補影印例言説借補之本有得自名山古剎者有得自遠地圖書館者有得自居士精舍者深為感謝已詳列補頁表中這幾十葉的補頁表詳記原藏書的機構並詳記補入各葉的版別這是最合於校勘學的原則的例如册次經名補頁版別徵藏地三册大般若經頁下至上永樂松坡圖書館又下至上思溪同上五册又頁下至上普寧南海康氏又下思溪松坡圖書館永樂是永樂八年一四一北京開刻的明北藏思溪是南宋初期約一一三二一一八安吉州湖州思溪資福禪寺刻成的大藏普寧是南宋末年約一二六九杭州餘杭縣普寧寺開刻的大藏普寧藏開刻在咸淳五年一二六九在蒙古兵攻入臨安之前七年其刻成當在元初日本保存的普寧寺大藏經目録是大德三年一二九九本寺僧如瑩用本寺所刻目録查編的故其刻成應在大德以前這樣列舉補頁的版別可以使人如道某一葉不是磧砂藏的原本但當年工作的人不多時間也很匆迫所以版別一欄頗有因依原記録而致誤的例如松坡圖書館所借思溪各卷原是楊守敬在日本收買來的書日本人在那時代並沒有注意磧砂藏經所以楊先生也不知道有磧砂藏故他認作思溪藏其實松坡圖書館所藏的楊惺吾之思溪差不多全是磧砂藏的零本影印磧砂藏的委員會的常務理事之中有一位範成和尚他為此大事出力最勤曾到各地去訪求古經有時著破衣經匪區冒很大的危險他的最大收穫是民國二十二年一九三三他在山西趙城廣勝寺發見古刻藏經卷子本五千多卷其中往往有雕刻年月其年代最早為金皇統九年一一四八最晚為大定十三年一一七三這確是一個很重要的發現因為這一大批金刻的藏經裏有許多是宋元明清各藏都沒有收的文件例如傳燈玉英集曹溪寶林傳都是久已認為失傳了的禪宗史料又如玄奘的弟子窺基的因明入正理論疏三卷存二卷和因明論理門十四過類疏都是因明學的重要文獻這五千多卷後來經過徐鴻寶蔣唯心諸君的考證選擇排出了宋元明清四朝各大藏沒有收的孤存古籍四十六種由影印磧砂藏的委員會影印流行題作宋藏遺珍這是影印磧砂藏的一個副産品其重要性可能不下於磧砂藏的本身當上海委員會諸公到處訪問可以借補的經卷的時期他們沒有夢想到北京的一座古寺叫做大悲寺收藏了幾百年的一部鈔配補配的磧砂藏經早已在幾年前約在一九二六一九二七被一個美國人吉禮士買去並且約在一九二九已運到加拿大東部的麥吉爾大學了吉禮士原是海軍情報局的軍人在美國駐華公使館裏當過海軍武官後來辭去軍職專替一個美國商人葛思德收買善本中國書吉禮士在北京住久了懂得一點中國話也能認識一些中國字他用海軍情報的偵探技術來辨別中國古書的版本居然能夠收買到不少精美的明朝刻本他沒有留下記載他如何買到這部宋元刻本磧砂藏經的資料所以我到今天還不知道這一樁祕密買賣的真歷史我只知道他做的很祕密他不敢請教中國朋友他全靠他的海軍情報訓練用放大鏡仔細考察這一大批五千三百四十八本的大藏經他能夠認識其中有近七百本是十三世紀南宋的刻本有一千六百三十多本是十四世紀元的刻本有八百六十多本是明朝刻本配補的有二千一百多本是白紙鈔配的這個葛思德東方書庫先後收買到明版書兩萬四千多册加上這七百本宋刻佛經和一千六百多本元刻佛經就成了歐美兩洲最富於宋元刻本的書庫了吉禮士並不知道這兩千三百多本宋元刻的佛經就是平江府磧砂延聖院在宋元兩代陸續刻成的磧砂大藏經他只叫他做大悲寺經他用了一部彙刻書目裡的大藏目録做參考編成他自己用的一本目録他連這部藏經用來編號的千字文的次序也不知道但他在那目録上每一册注出宋元明字樣我曾仔細覆檢可以説百分之九十八九不錯的這位海軍武官的眼力很高明的這個葛思德東方書庫的書越積越多了而葛思德先生在美洲經濟恐慌的年頭又越過越窮了麥吉爾大學買不起這一大批沒有人用的中國古版書只好讓葛思德先生把這十多萬本書賣給新成立一九三的更高學術研究院這個研究院設在美國紐澤西州的普林斯敦其地原有成立近二百年的普林斯敦大學更高學術研究院沒有東方學的研究也沒有貯藏這十幾萬册中國古書的空屋恰好普林斯敦大學建造了一個新的大學圖書館願意容納葛思德書庫的書所以這個書庫的十幾萬册中國善本書就收藏在普林斯敦大學圖書館裏了一九五至一九五二我接受了普林斯敦大學的聘約擔任了兩年的葛思德東方書庫的庫長我的主要任務是調查這個書庫究竟有些什麼東西有些什麼寶貝我曾寫長文登在敘述葛思德東方書庫的歷史略述這書庫裏收藏的許多可珍貴的古本書籍我的一個最有趣的發見就是證實了那半部二千三百多本宋刻和元刻的藏經確是磧砂延聖院的大藏原本我向哈佛大學影印了磧砂藏影印本的新目録來和這部殘本對勘又用昭和法寶總目録裏各種宋元明刻本大藏經目録來比勘我比勘的結果不但確定了葛思德書庫裡這二千三百多本宋元刻本是磧砂藏的原刻本並且知道了這些事實一這裏面的二千一百多本白紙鈔補本都是依據磧砂藏刻本精鈔的鈔補的年月都在萬曆二十八年一六左右這些鈔補本的編號都和磧砂藏經的編號相符其中有一百册是萬曆二十八年建極殿大學士趙志皋的夫人沈氏捐銀鈔補為他丈夫祈求病痊的二這裏面配補的明刻藏經八百多本其中絶大部分是洪武年間開刻的南藏本北藏字大版葉也大故不適于配補磧砂藏南藏刻在南京是和宋刻各藏本子大小相同故最好配補南藏本在國內是很難見到的三配補的明本之中還有建文元年己卯刻的天龍山藏經因為成祖要毀滅建文一代的事實故建文兩字都被挖去了只剩元年己卯的紀年這是很少見的史料所以這五千三百多本的鈔配的磧砂藏經不但那七百本宋刻和一千六百多本元刻是難得的原刻本那二千一百多本十六世紀末年精鈔本也是可貴的那八百多本明刻南藏本和那更少見的建文元年一三九九天龍山刻本也都是很可寶貴的我還有一個發現上海影印磧砂藏經的例言首册之一第十九頁曾説全藏中函卷闕佚在所不免其有經名可檢者已向各地徵訪一一補入另列補頁表附後惟尚有經名失考暫無從訪補者十一卷即寧字函之第三第四第九第十更字函之第一第二第三橫字函之第七第八何字函之第八第九以俟異日據以續求焉我試查葛思德本磧砂藏居然發見了這十一卷中的七卷寧字函第五六八寧三金剛頂觀自在王如來修行法一卷唐不空譯寧四略述金剛頂瑜珈分別聖位修證法門一卷唐不空譯更字函第五七一更一瑜伽集要救阿難陀羅尼焰口軌儀經一卷唐不空譯更二顯密圓通成佛心要集卷上五臺山金河寺沙門道殿集更三顯密圓通成佛心要集卷下橫字函第五七六橫七地藏菩薩本願經卷上實叉難陀譯橫八地藏菩薩本願經卷下以上七册只有寧三與橫七是明萬曆時依磧砂藏本精鈔本餘五册都是元朝刻本還有影印本所缺的寧九寧十兩册我檢葛思德書庫的磧砂藏原來寧九即是影印本的寧十一寧十即是影印本的寧十二寧九三經同卷影印本編寧十一佛説一髻尊陀羅尼經不空譯金剛摧碎陀羅尼大契丹國師中天竺摩竭陀國三藏法師慈賢譯不空羂索毗盧遮那佛大灌頂光真言不空譯寧十妙吉祥平等瑜伽祕密觀身成佛儀軌大契丹國師慈賢譯影印本編寧十二是依據借補的普寧藏的紙縫編的寧十二故寧九寧十其實沒有缺失例言所舉尚有經名失考暫無從訪補的十一卷其中七卷可用葛思德書庫的磧砂藏鈔補或影照其中兩卷實沒有缺不過編號不同而已只有何八何九兩卷現在還不知道是什麼經還無從訪補中央研究院的歷史語言研究所有一部磧砂藏經影印本今年葛思德書庫主任童世綱先生把這可補的七卷都影印了給我帶回國贈送給史語所圖書室這是國內第一次補得這七卷童世綱先生的好意是值得記載的朱慶瀾葉恭綽範成和尚諸公影印的全部磧砂大藏是民國二十四年一九三五年底完成的到今天已是二十四年了這二十四年是在戰禍裏過去的很少有人能夠仔細研究這一大部保存十三世紀和十四世紀初年刻板原樣的磧砂藏經所以這部影印的磧砂藏到今天還沒有得著一篇正確的公平的評論我試舉一個例子我這幾天用大正大藏的契嵩傳法正宗記傳法正宗定祖圖傳法正宗論來比勘磧砂藏本單舉傳法正宗定祖圖一卷來説大正藏本完全沒有圖而磧砂藏本保存了原圖四十四幅我們看了這些圖才能夠明白契嵩原表所謂其圖所列自釋迦文佛大迦葉至乎曹溪第六祖大鑒禪師凡三十四位又以儒釋之賢其言吾宗祖素有證據者十位列於諸祖左右的原來樣子大正藏所根據的底本就沒有圖了又把那原列於諸祖左右的十位儒釋之賢契嵩所謂宗證十人全部記在卷末這就更失了契嵩的原意了我舉此一例使人知道這部磧砂藏影印本確是有遠勝于大正藏的地方四十八年十一月十六夜中華大藏經第一輯磧砂藏校訂目録第一册至第六十册天地玄黃宇宙洪荒日月盈昃辰宿列張寒來暑往秋收冬藏閏餘成歲律呂調陽雲騰致雨露結為霜金生麗水玉出崑岡劍號巨闕珠稱夜光果珍李奈大般若波羅蜜多經六百卷唐玄奘譯唐太宗通序唐高宗記玄則每會序附般若佛姆心呪般若佛姆親心呪第六十一册至六十三册菜重芥放光摩訶般若波羅蜜經三十卷晉無羅叉共竺叔蘭譯第六十四册至第六十六册薑海鹹摩訶般若波羅蜜經三十卷姚秦鳩摩羅什共僧睿譯第六十七册至第六十八册河淡千佛説光讚般若波羅蜜經十卷晉竺法護譯卍五補録摩訶般若波羅蜜鈔經五卷苻秦曇摩蜱共竺佛念譯第六十九册鱗道行摩訶般若波羅蜜經十卷後漢支婁迦讖譯嘉淡補録第七十册潛小品般若波羅蜜經十卷姚秦鳩摩羅什譯僧睿序第七十一册羽勝天王般若波羅蜜經七卷陳月婆首那譯大正二三一補録大明度無極經六卷吳支謙譯第七十二册翔佛説濡首菩薩無上清淨分衛經二卷宋翔公譯金剛般若波羅蜜經一卷姚秦鳩摩羅什譯嘉羽卍五補録金剛般若波羅蜜經一卷元魏留支譯大正二三六補録金剛般若波羅蜜經一卷元魏留支譯此係陳真諦譯依思溪誤題見前經普寧題記金剛能斷般若波羅蜜經一卷隋笈多譯能斷金剛般若波羅蜜經一卷唐義淨譯能斷金剛般若波羅蜜多經一卷唐玄奘譯實相般若波羅蜜經一卷唐菩提留志等譯佛説仁王護國般若波羅蜜經二卷姚秦鳩摩羅什譯卷上尾題無護國二字摩訶般若波羅蜜大明呪經