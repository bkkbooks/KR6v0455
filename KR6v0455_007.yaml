body:
  text: 中華大藏經譯藏編目説明一中華大藏經譯藏專收由漢文譯成西洋文字之經典其由梵藏日文譯出亦以有漢文本者為限以漢文與西文對照刊載二所收漢文本不盡見於各藏其見於各藏者字句亦有不同悉以所收之本為準三不見於各藏內之漢文著作譯成西文者如泛論佛學及演説辭等不録四初步徵集所得無多只分經集雜集二部不需總目中華大藏經譯藏目録經集部金剛般若波羅蜜多經一卷姚秦鳩摩羅什譯民國陸寬昱英譯見佛學叢書經典部般若波羅蜜多心經一卷唐玄奘譯民國陸寬昱英譯見佛學叢書經典部大寶積經一百二十卷唐菩提流志譯并合民國包可華英譯載獅子吼月刊觀無量壽佛經一卷劉宋疆良耶舍譯民國維幻英譯見佛學叢書經典部阿彌陀經一卷姚秦鳩摩羅什譯德國麥克斯英洛英譯見佛學叢書經典部淨土四經四卷阿彌陀經姚秦鳩摩羅什譯日本高草英譯無量壽經後魏康僧鎧譯觀無量壽佛經劉宋疆良耶舍譯皆德國馬克斯彌勒英譯普賢行願品唐般若譯民國呂碧城英譯妙法蓮華經普門品一卷姚秦鳩摩羅什譯荷蘭克爾恩英譯見佛學叢書經典部遺教經一卷姚秦鳩摩羅什譯民國周祥光英譯見佛學叢書經典部藥師琉璃光如來本願功德經一卷唐玄奘譯民國周叔迦英譯見佛學叢書經典部十善業道經一卷唐實叉難陀譯民國黃茂林英譯見佛學叢書經典部八大人覺經一卷後漢安世高譯民國廖德貞英譯見佛學叢書經典部四十二章經一卷後漢迦葉摩騰等譯英國竹禪英譯見佛學叢書經典部南傳三經三卷民國法舫成元慧等譯錫蘭德寶英譯三經為吉祥經三寶經大悲經見佛學叢書經典部羯臘摩經一卷民國丘寶光譯泰國寧滿海敏英譯見佛學叢書經典部南傳法句一卷民國了參譯錫蘭那羅陀英譯見佛學叢書經典部雜集部六祖大師法寶壇經一卷唐慧能説法海集民國黃茂林英譯見佛學叢書經典部六祖大師法寶壇經一卷唐慧能説法海集佚名英譯佛曆二五年曇昕序香港佛經流通處鉛印六祖法寶壇經一卷唐慧能説法海集民國馮善甫善敦英譯出版見香港佛教五二期雲巖寶鏡三昧一卷唐良價説民國陸寬昱英譯見慧炬革新號第八期中英佛學辭典不分卷附中梵巴文檢字索引英國蘇慈爾教授美國郝德士教授原編民國聖剛李忠武曾萊𤊟增補臺灣佛教文化服務處出版
